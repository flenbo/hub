<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Flenbo Hub — Operations Platform</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2642">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flenbo Hub">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1A2642;--navy2:#243254;--navy3:#344266;
  --gold:#C9A668;--gold2:#FBF4E6;--gold3:#E8D5A8;
  --bg:#F0F2F8;--card:#fff;--border:#DDE3EE;
  --txt:#1A2642;--muted:#6B7898;--light:#9AA5BF;
  --ok:#166534;--ok-bg:#DCFCE7;--ok2:#16A34A;
  --warn:#92400E;--warn-bg:#FEF3C7;--warn2:#D97706;
  --red:#991B1B;--red-bg:#FEE2E2;--red2:#DC2626;
  --purple:#5B21B6;--purple-bg:#EDE9FE;--purple2:#7C3AED;
  --r:10px;
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;overflow-x:hidden}

/* ── HEADER ── */
.hdr{background:var(--navy);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-inner{display:flex;align-items:center;gap:10px;max-width:600px;margin:0 auto}
.hdr-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1;flex-shrink:0;opacity:.8}
.hdr-back:hover{opacity:1}
.hdr-brand{flex:1}
.hdr-brand-name{font-size:16px;font-weight:800;letter-spacing:.5px}
.hdr-brand-name span{color:var(--gold)}
.hdr-brand-sub{font-size:10px;opacity:.6;margin-top:1px;letter-spacing:.3px}
.hdr-right{text-align:right;font-size:11px;opacity:.75;flex-shrink:0;line-height:1.5}
.hdr-role{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.role-staff{background:rgba(201,166,104,.2);color:var(--gold)}
.role-manager{background:rgba(91,33,182,.3);color:#c4b5fd}
.role-admin{background:rgba(220,38,38,.25);color:#fca5a5}

/* ── SCREENS ── */
.scr{display:none;padding:14px;max-width:600px;margin:0 auto;padding-bottom:100px}
.scr.on{display:block}
.scr-wide{max-width:960px}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1a1a3e 100%)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-name{font-size:36px;font-weight:900;color:#fff;letter-spacing:2px}
.login-logo-name span{color:var(--gold)}
.login-logo-sub{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.login-divider{width:40px;height:2px;background:var(--gold);margin:12px auto}
.login-card{background:#fff;border-radius:14px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-card-ttl{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:18px;text-align:center}
.login-error{background:var(--red-bg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:600;margin-bottom:12px;display:none;align-items:center;gap:6px}
.login-error.show{display:flex}

/* ── FORMS ── */
.fl{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:14px 0 5px}
.fl:first-child{margin-top:0}
.fi,.fs,.ft{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-size:14px;color:var(--txt);background:#fff;font-family:inherit;transition:border .15s}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--navy)}
.ft{resize:vertical;min-height:80px}
.fi-pw{position:relative}
.fi-pw .fi{padding-right:40px}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted)}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 20px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;transition:all .15s;letter-spacing:.2px;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover:not(:disabled){background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover:not(:disabled){background:var(--gold3)}
.btn-out{background:transparent;border:2px solid var(--border);color:var(--txt)}.btn-out:hover:not(:disabled){border-color:var(--navy)}
.btn-ok{background:var(--ok2);color:#fff}.btn-ok:hover:not(:disabled){background:var(--ok)}
.btn-red{background:var(--red2);color:#fff}
.btn-warn{background:var(--warn2);color:#fff}
.btn-purple{background:var(--purple2);color:#fff}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;font-weight:700}
.btn-xs{padding:4px 10px;font-size:11px;width:auto;font-weight:700}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-row .btn{flex:1;min-width:110px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:15px;height:15px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-ttl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.b-navy{background:#e8eaf6;color:var(--navy)}.b-gold{background:var(--gold2);color:#7a5a1a}
.b-ok{background:var(--ok-bg);color:var(--ok)}.b-red{background:var(--red-bg);color:var(--red)}
.b-warn{background:var(--warn-bg);color:var(--warn)}.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-rest{background:#e8eaf6;color:var(--navy)}.b-cat{background:var(--purple-bg);color:var(--purple)}
.b-cld{background:#e3f2fd;color:#0d47a1}.b-urg{background:var(--warn-bg);color:var(--warn)}
.b-muted{background:#f0f2f8;color:var(--muted)}

/* ── HOME TILES ── */
.home-top{text-align:center;padding:20px 0 16px}
.home-greeting{font-size:22px;font-weight:800;color:var(--navy)}
.home-sub{font-size:12px;color:var(--muted);margin-top:3px}
.id-bar{background:var(--navy);color:#fff;border-radius:9px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.id-info{font-size:13px;line-height:1.6}
.id-info strong{display:block;font-size:15px}
.id-role{font-size:10px;background:rgba(201,166,104,.2);color:var(--gold);padding:2px 8px;border-radius:8px;font-weight:700}
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.tile{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px}
.tile:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:0 4px 14px rgba(26,38,66,.12)}
.tile.gold{background:linear-gradient(135deg,#fff9f0,var(--gold2));border-color:var(--gold3)}
.tile.gold:hover{border-color:var(--gold)}
.tile.purple{background:linear-gradient(135deg,#faf5ff,var(--purple-bg));border-color:#c4b5fd}
.tile.purple:hover{border-color:var(--purple2)}
.tile-icon{font-size:36px;line-height:1}
.tile-label{font-size:14px;font-weight:800;color:var(--txt)}
.tile-sub{font-size:11px;color:var(--muted);line-height:1.3}

/* ── TABS ── */
.tabs{display:flex;background:var(--card);border-radius:9px;padding:3px;margin-bottom:12px;border:1px solid var(--border);gap:2px;overflow-x:auto}
.tb{flex:1;min-width:70px;padding:8px 5px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:10px;font-weight:700;text-align:center;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;font-family:inherit}
.tb.on{background:var(--navy);color:#fff}
.tb-cnt{display:inline-flex;align-items:center;justify-content:center;background:var(--gold);color:var(--navy);font-size:9px;width:15px;height:15px;border-radius:50%;margin-left:3px;font-weight:800;vertical-align:middle}

/* ── ORDER TYPE ── */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.type-tile{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:7px}
.type-tile:hover:not(.disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.type-tile.sel{border-width:3px;border-color:var(--navy)}
.type-tile.disabled{opacity:.4;cursor:not-allowed;background:#f8f8f8}
.tt-icon{font-size:38px}.tt-name{font-size:14px;font-weight:800;color:var(--txt)}
.tt-desc{font-size:11px;color:var(--muted);line-height:1.3}
.tt-soon{font-size:10px;background:#e5e7eb;color:#6b7280;padding:2px 8px;border-radius:10px;font-weight:700}

/* ── URGENCY ── */
.urg-row{display:flex;gap:9px}
.urg-btn{flex:1;padding:10px;border-radius:8px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:700;text-align:center;transition:all .15s;color:var(--muted);font-family:inherit}
.urg-btn.ok{border-color:var(--ok2);background:var(--ok-bg);color:var(--ok)}
.urg-btn.hot{border-color:var(--warn2);background:var(--warn-bg);color:var(--warn)}

/* ── ITEM TABS ── */
.srch{position:relative;margin-bottom:11px}
.srch input{padding-left:36px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);pointer-events:none}

/* ── CATEGORY ACCORDION ── */
.cat-block{background:var(--card);border-radius:9px;margin-bottom:8px;overflow:hidden;border:1px solid var(--border)}
.cat-hdr{padding:10px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:#f5f7fc;transition:background .1s}
.cat-hdr:hover{background:#eef0f8}
.cat-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--navy2)}
.cat-cnt{font-size:10px;background:#e8eaf6;color:var(--navy);padding:2px 7px;border-radius:8px;margin-left:6px;font-weight:700}
.cat-arr{font-size:11px;color:var(--muted);transition:transform .2s}
.cat-arr.o{transform:rotate(180deg)}
.cat-body{display:none}.cat-body.o{display:block}

/* ── ITEM ROW ── */
.item-row{display:flex;align-items:center;padding:8px 13px;border-top:1px solid #f0f2f8;gap:8px;transition:background .1s}
.item-row.ic{background:#f0f7ff}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;line-height:1.3;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-hist{font-size:10px;color:var(--light);margin-top:1px}
.item-hist .hl{color:var(--navy2);font-weight:600}
.item-controls{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qb{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:#fff;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .1s;flex-shrink:0}
.qb:hover,.qb.on{border-color:var(--navy);background:var(--navy);color:#fff}
.qn{width:38px;text-align:center;font-size:14px;font-weight:700;border:2px solid var(--border);border-radius:6px;padding:3px 1px;color:var(--txt);font-family:inherit}
.qn:focus{outline:none;border-color:var(--navy)}
.qu{width:62px;font-size:11px;border:2px solid var(--border);border-radius:6px;padding:3px 2px;color:var(--txt);background:#fff;cursor:pointer;font-family:inherit}
.qu:focus{outline:none;border-color:var(--navy)}
.no-res{padding:20px;text-align:center;font-size:13px;color:var(--muted)}

/* ── FREQUENT GRID ── */
.freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.freq-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 11px;cursor:pointer;transition:all .15s}
.freq-item:hover{border-color:var(--navy);background:#f5f7fc}
.freq-item.ic{border-color:var(--ok2);background:var(--ok-bg)}
.fi-name{font-size:12px;font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:4px}
.fi-hist{font-size:10px;color:var(--muted)}
.fi-hist .hl{color:var(--navy2);font-weight:600}
.fi-controls{display:flex;align-items:center;gap:5px;margin-top:7px}

/* ── FAB ── */
.fab{position:fixed;bottom:18px;right:16px;background:var(--navy);color:#fff;border:none;border-radius:50px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;gap:7px;z-index:200;transition:all .2s;font-family:inherit}
.fab:hover{transform:translateY(-2px)}
.fab-cnt{background:var(--gold);color:var(--navy);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.fab.hide{display:none}

/* ── INFO BAR ── */
.info-bar{background:var(--navy);color:#fff;border-radius:9px;padding:11px 14px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ib{display:flex;flex-direction:column;gap:2px}
.ib-l{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.5px}
.ib-v{font-size:13px;font-weight:700}
.event-bar{background:var(--purple2);color:#fff;border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:13px}
.event-bar strong{font-size:15px;display:block;margin-bottom:2px}

/* ── REVIEW ── */
.rev-sup{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:9px 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px}
.rev-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f2f8;font-size:13px}
.rev-item:last-child{border-bottom:none}
.rev-qty{font-weight:700;color:var(--navy);margin-left:10px;flex-shrink:0}
.rev-empty{text-align:center;padding:28px;color:var(--muted);font-size:13px}

/* ── CONFIRM ── */
.conf-icon{font-size:60px;text-align:center;margin:20px 0 10px}
.conf-ttl{font-size:20px;font-weight:800;text-align:center;color:var(--ok);margin-bottom:5px}
.conf-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.6}
.oid-box{background:var(--gold2);border:2px dashed var(--gold);border-radius:9px;padding:14px;text-align:center;margin-bottom:16px}
.oid-l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px}
.oid-v{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:2px;font-family:monospace}

/* ── STEP BAR ── */
.step-bar{display:flex;gap:5px;justify-content:center;margin-top:7px}
.sb{height:4px;border-radius:2px;background:rgba(255,255,255,.2);flex:1;transition:background .2s}
.sb.done{background:rgba(255,255,255,.5)}.sb.now{background:var(--gold)}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center}
.stat-n{font-size:28px;font-weight:800;color:var(--navy)}
.stat-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:2px}
.stat.gold .stat-n{color:#7a5a1a}.stat.ok .stat-n{color:var(--ok)}.stat.warn .stat-n{color:var(--warn2)}.stat.red .stat-n{color:var(--red2)}

/* ── MANAGER APPROVAL ── */
.req-card{background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:9px;overflow:hidden}
.req-hdr{padding:11px 14px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;background:#f5f7fc;transition:background .1s}
.req-hdr:hover{background:#eef0f8}
.req-id{font-family:monospace;font-size:11px;font-weight:700;color:var(--navy)}
.req-meta{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.req-body{display:none;padding:12px 14px;border-top:1px solid var(--border)}
.req-body.o{display:block}
.rev-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f0f2f8;gap:8px}
.rev-row:last-child{border-bottom:none}
.rev-row.rejected{opacity:.45;text-decoration:line-through}
.rv-name{flex:1;font-size:13px}
.rv-qty-inp{width:64px;padding:5px 6px;border:2px solid var(--border);border-radius:6px;font-size:13px;font-weight:700;text-align:center;font-family:inherit}
.rv-qty-inp:focus{outline:none;border-color:var(--navy)}
.rv-unit{font-size:11px;color:var(--muted);width:50px}
.rv-reject{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .1s}
.rv-reject.on{border-color:var(--red2);background:var(--red-bg);color:var(--red2)}

/* ── LEAVE ── */
.leave-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.lt-btn{padding:12px;border:2px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;text-align:center;font-size:13px;font-weight:700;color:var(--muted);transition:all .15s;font-family:inherit}
.lt-btn.sel{border-color:var(--navy);background:#f0f2fa;color:var(--navy)}
.leave-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:9px}
.lc-top{display:flex;align-items:flex-start;justify-content:space-between}
.lc-name{font-size:13px;font-weight:700}
.lc-dates{font-size:11px;color:var(--muted);margin-top:3px}

/* ── ATTENDANCE ── */
.att-status{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px}
.att-status.in{border-color:var(--ok2);background:var(--ok-bg)}
.att-status.out{border-color:var(--warn2);background:var(--warn-bg)}
.att-icon{font-size:48px;margin-bottom:8px}
.att-label{font-size:16px;font-weight:800;color:var(--txt)}
.att-time{font-size:22px;font-weight:800;color:var(--navy);margin:4px 0}
.att-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f2f8;font-size:13px}
.att-row:last-child{border-bottom:none}

/* ── UPCOMING EVENTS ── */
.ev-section{margin-bottom:14px}
.ev-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ev-section-ttl{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--navy)}
.ev-count{font-size:11px;background:var(--purple-bg);color:var(--purple2);padding:2px 9px;border-radius:10px;font-weight:700}
.ev-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ev-card-hdr{background:linear-gradient(135deg,var(--purple2) 0%,#4c1d95 100%);color:#fff;padding:11px 14px}
.ev-card-name{font-size:14px;font-weight:800;margin-bottom:4px}
.ev-card-meta{font-size:11px;opacity:.85;display:flex;flex-wrap:wrap;gap:5px}
.ev-pill{background:rgba(255,255,255,.15);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap}
.ev-card-body{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ev-loc{font-size:13px;color:var(--txt);font-weight:500}
.ev-days{font-size:11px;color:var(--muted);margin-top:2px}
.ev-detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f2f8;font-size:13px}
.ev-detail-row:last-child{border-bottom:none}
.ev-detail-label{color:var(--muted);font-size:12px}
.ev-detail-val{font-weight:600;text-align:right;max-width:60%}
.ev-items-list{margin-top:4px}
.ev-item-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #f8f8f8}

/* ── ADMIN: TABLES ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f2f8;padding:8px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border)}
td{padding:8px 11px;border-bottom:1px solid #f5f7fc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfe}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.modal-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-ttl{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:2px 6px}
.modal-body{padding:16px}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* ── PROCUREMENT ── */
.po-sup-block{margin-bottom:14px}
.po-sup-hdr{background:var(--navy);color:#fff;padding:9px 14px;border-radius:9px 9px 0 0;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.po-item{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid #f0f2f8;gap:8px;font-size:13px}
.po-item:last-child{border-bottom:none;border-radius:0 0 9px 9px}
.po-name{flex:1}
.po-loc{font-size:10px;color:var(--muted)}
.po-qty{font-weight:700;color:var(--navy);min-width:80px;text-align:right}
.po-chk{width:18px;height:18px;cursor:pointer;accent-color:var(--navy)}

/* ── MISC ── */
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty-icon{font-size:42px;margin-bottom:10px}
.sep{height:1px;background:var(--border);margin:12px 0}
.alert{border-radius:8px;padding:9px 12px;font-size:12px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.alert-warn{background:var(--warn-bg);color:var(--warn)}
.alert-ok{background:var(--ok-bg);color:var(--ok)}
.alert-red{background:var(--red-bg);color:var(--red)}
.alert-navy{background:#e8eaf6;color:var(--navy)}

@media(max-width:480px){
  .tile-grid,.type-grid,.leave-type-grid{grid-template-columns:1fr 1fr}
  .freq-grid{grid-template-columns:1fr 1fr}
  .stat-row{grid-template-columns:repeat(3,1fr)}
}

.hdr-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);cursor:pointer;flex-shrink:0}
.hdr-photo-init{width:36px;height:36px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;cursor:pointer;flex-shrink:0;border:2px solid var(--gold)}
.hdr-user-col{display:flex;flex-direction:column;align-items:flex-end;gap:2px}

/* ════════════════════════════════════════════
   API
════════════════════════════════════════════ */
async function api(params, _retry){
  if(!isBackendSet()) return null;
  try{
    const url=CFG.BACKEND_URL+'?'+new URLSearchParams(params);
    const r=await fetch(url);
    if(!r.ok){
      // GAS cold-start returns 404/500 on first request — retry once after 3s
      if(!_retry){console.warn('API cold-start retry:',r.status);await new Promise(res=>setTimeout(res,3000));return api(params,true);}
      return null;
    }
    return await r.json();
  }catch(e){console.warn('API error',e);return null;}
}
async function apiData(action,data,_retry){
  if(!isBackendSet()) return null;
  try{
    const url=CFG.BACKEND_URL+'?action='+encodeURIComponent(action)+'&data='+encodeURIComponent(JSON.stringify(data));
    const r=await fetch(url);
    if(!r.ok){
      if(!_retry){console.warn('API cold-start retry:',r.status);await new Promise(res=>setTimeout(res,3000));return apiData(action,data,true);}
      return null;
    }
    return await r.json();
  }catch(e){console.warn('API error',e);return null;}
}

async function doLogin(){

  const p=(S.loginPw||'').trim();
  if(!u||!p){S.loginError='Enter username and password.';render();return;}
  S.loading=true;S.loginError='';render();
  let user=null;
  if(isBackendSet()){
    const res=await api({action:'login',username:u,password:p});
    if(res?.success) user=res.user;
  } else {
    user=DEMO_USERS.find(x=>x.username===u&&String(x.password)===String(p))||null;

  S.loading=false;
  if(!user){S.loginError='Invalid username or password.';render();return;}
  S.user=user;lsS('fb_session',user);
  S.screen=homeScreen();
  if(user.role==='manager') loadManagerData();
  else if(user.role==='admin') loadAdminData();
  else loadStaffData();
  render();
}

  return`<div class="freq-grid">${filtered.map(f=>{
    const k=`${f.sup}|${f.cat}|${f.name}`;const v=S.cart[k]||{qty:0,unit:f.unit};
    return`<div class="freq-item ${v.qty>0?'ic':''}">

function renderSupTab(sup,search){
  const cats=ITEMS[sup];if(!cats)return`<div class="no-res">No items</div>`;
  return Object.entries(cats).map(([cat,items])=>{
    const filtered=search?items.filter(([n])=>n.toLowerCase().includes(search)):items;
    if(!filtered.length&&search)return'';
    const open=S.catOpen[cat]!==false;
    const inCart=filtered.filter(([n])=>{const k=`${sup}|${cat}|${n}`;return(S.cart[k]?.qty||0)>0;}).length;
    return`<div class="cat-block">
      <div class="cat-hdr" onclick="S.catOpen['${esc(cat)}']=!S.catOpen['${esc(cat)}'];render()">
        <span class="cat-name">${esc(cat)}<span class="cat-cnt">${inCart||''}</span></span>
        <span class="cat-arr ${open?'o':''}">▼</span>
      </div>
      <div class="cat-body ${open?'o':''}">
        ${filtered.map(([name,defUnit])=>{
          const k=`${sup}|${cat}|${name}`;const v=S.cart[k]||{qty:0,unit:defUnit};
          const h=getItemHist()[name];
          return`<div class="item-row ${v.qty>0?'ic':''}">
            <div class="item-info">
              <div class="item-name" title="${esc(name)}">${esc(name)}</div>
              ${h?.lastDate?`<div class="item-hist">📅 ${fmtDate(h.lastDate)} · <span class="hl">${h.lastQty} ${h.lastUnit}</span> · ${h.orders}x</div>`:''}

              <input class="qn" type="number" min="0" value="${v.qty||0}" oninput="setCart('${esc(k)}','${esc(defUnit)}',this.value)">
              <select class="qu" onchange="setCartUnit('${esc(k)}',this.value)">${UNITS.map(u=>`<option ${(v.unit||defUnit)===u?'selected':''}>${u}</option>`).join('')}</select>

    </div>`;
  }).join('');
}

function adjCart(k,defUnit,d){
  if(!S.cart[k])S.cart[k]={qty:0,unit:defUnit};
  S.cart[k].qty=Math.max(0,parseFloat(S.cart[k].qty||0)+d);
  render();
}
function setCart(k,defUnit,v){
  if(!S.cart[k])S.cart[k]={qty:0,unit:defUnit};
  S.cart[k].qty=Math.max(0,parseFloat(v)||0);
}
function setCartUnit(k,u){if(S.cart[k])S.cart[k].unit=u;}

async function submitOrder(){
  const items=cartItems();if(!items.length)return;
  S.loading=true;render();
  S.orderId=genId(S.user.location);
  const resolvedLoc = S.orderType==='Catering'?(S.eventLocation==='NEW LOCATION'?S.eventLocationNew:S.eventLocation):(S.ckLocation||S.user.location);
  const order={
    orderId:S.orderId,orderType:S.orderType,
    eventType:S.eventType,eventName:S.eventName,eventDate:S.eventDate,eventTime:S.eventTime,
    pax:S.pax,eventClient:S.eventClient,eventPhone:S.eventPhone,
    ckLocation:S.ckLocation,eventLocation:resolvedLoc,
    location:resolvedLoc,staffName:S.user.name,userId:S.user.userId,
    deliveryDate:S.deliveryDate,urgency:S.urgency,remarks:S.remarks,
    submittedAt:new Date().toISOString(),items,status:'Pending',
  };
  const res=await apiData('submit',order);
  if(!res&&!isBackendSet()){/* demo */}
  // Save catering event for upcoming events section
  if(S.orderType==='Catering'){
    const evList=lsG('fb_catering_events',[]);
    evList.push({
      orderId:order.orderId,eventType:order.eventType,eventName:order.eventName,
      eventDate:order.eventDate,eventTime:order.eventTime,pax:order.pax,
      eventLocation:order.eventLocation,eventClient:order.eventClient,
      eventPhone:order.eventPhone,deliveryDate:order.deliveryDate,
      urgency:order.urgency,remarks:order.remarks,staffName:order.staffName,
      submittedAt:order.submittedAt,status:'Pending',items:order.items,
    });
    lsS('fb_catering_events',evList);
    S.upcomingEvents=getLocalCateringEvents();
  }
  saveItemHist(items);
  S.loading=false;
  go('s-ration-confirm');
}

function renderLeaveForm(){
  const al=(S.user.annualLeave||0);
  const cl=(S.user.casualLeave||0);
  const leaveDays=S.leaveFrom&&S.leaveTo?Math.max(0,Math.round((new Date(S.leaveTo)-new Date(S.leaveFrom))/(86400000))+1):0;
  const notEnoughAnnual=S.leaveType==='Annual Leave'&&leaveDays>al;
  const notEnoughCasual=S.leaveType==='Casual Leave'&&leaveDays>cl;
  const sickExceeds2=S.leaveType==='Sick Leave'&&leaveDays>2;
  const notEnoughSick=S.leaveType==='Sick Leave'&&leaveDays>al;
  const disableSubmit=!S.leaveType||!S.leaveFrom||!S.leaveTo||!S.leaveReason||notEnoughAnnual||notEnoughCasual||sickExceeds2||notEnoughSick||S.loading;
  const balPolicyHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div onclick="S.leaveType='Annual Leave';render()" style="border:2px solid ${S.leaveType==='Annual Leave'?'var(--navy)':'var(--border)'};background:${S.leaveType==='Annual Leave'?'#f0f2fa':'#fff'};border-radius:9px;padding:11px;cursor:pointer;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#1a2642">${al.toFixed(2)*1}</div>
        <div style="font-size:12px;font-weight:700;color:var(--navy)">Annual Leave</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">✅ No salary deduction</div>
      </div>
      <div onclick="S.leaveType='Casual Leave';render()" style="border:2px solid ${S.leaveType==='Casual Leave'?'#dc2626':'var(--border)'};background:${S.leaveType==='Casual Leave'?'#fff5f5':'#fff'};border-radius:9px;padding:11px;cursor:pointer;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#dc2626">${cl.toFixed(2)*1}</div>
        <div style="font-size:12px;font-weight:700;color:#dc2626">Casual Leave</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">⚠️ Salary deducted · max 2/month</div>
      </div>
    </div>
    <div onclick="S.leaveType='Sick Leave';render()" style="border:2px solid ${S.leaveType==='Sick Leave'?'#b45309':'var(--border)'};background:${S.leaveType==='Sick Leave'?'#fffbeb':'#fff'};border-radius:9px;padding:11px;cursor:pointer;text-align:center;margin-bottom:12px">
      <div style="font-size:14px;font-weight:800;color:#b45309">🤒 Sick Leave</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">Max 2 days · Deducted from Annual Leave · Salary deducted</div>
    </div>`;
  return`<div class="scr on">
    <div class="card">
      <div class="card-ttl">Leave Application</div>
      <label class="fl">Select Leave Type — tap to choose *</label>
      ${balPolicyHTML}
      ${S.leaveType==='Annual Leave'?`<div class="alert alert-ok" style="margin-bottom:10px"><strong>Annual Leave</strong> — balance reduced by days taken. No salary deduction.</div>`:''}
      ${S.leaveType==='Casual Leave'?`<div class="alert alert-warn" style="margin-bottom:10px"><strong>Casual Leave</strong> — salary deducted for days absent. Balance: ${cl} remaining. Expires 31st March every year.</div>`:''}
      ${S.leaveType==='Sick Leave'?`<div class="alert" style="background:#fffbeb;border-color:#b45309;margin-bottom:10px"><strong>🤒 Sick Leave</strong> — max 2 days per application. Days deducted from your Annual Leave balance (${al} remaining). Salary is deducted.</div>`:''}
      <label class="fl">From Date *</label>
      <input class="fi" type="date" value="${esc(S.leaveFrom)}" min="${today()}" oninput="S.leaveFrom=this.value;render()">
      <label class="fl">To Date *</label>
      <input class="fi" type="date" value="${esc(S.leaveTo)}" min="${S.leaveFrom||today()}" oninput="S.leaveTo=this.value;render()">
      ${leaveDays>0?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">📅 ${leaveDays} day${leaveDays>1?'s':''} selected</div>`:''}
      ${notEnoughAnnual?`<div class="alert alert-warn">⚠️ You only have ${al} Annual Leave day${al!==1?'s':''} remaining.</div>`:''}
      ${notEnoughCasual?`<div class="alert alert-warn">⚠️ You only have ${cl} Casual Leave day${cl!==1?'s':''} remaining.</div>`:''}
      ${sickExceeds2?`<div class="alert alert-warn">⚠️ Sick Leave is limited to 2 days per application.</div>`:''}
      ${notEnoughSick&&!sickExceeds2?`<div class="alert alert-warn">⚠️ Insufficient Annual Leave balance for Sick Leave (${al} days remaining).</div>`:''}
      <label class="fl">Reason *</label>
      <textarea class="ft" rows="3" placeholder="Briefly explain the reason…" oninput="S.leaveReason=this.value;updateLeaveBtn()">${esc(S.leaveReason)}</textarea>
    </div>
    <button id="leave-submit-btn" class="btn btn-gold" onclick="submitLeave()" ${disableSubmit?'disabled':''}>
      ${S.loading?'<span class="spin"></span> Submitting…':'Submit Leave Application'}
    </button>
  </div>`;
}

function updateLeaveBtn(){
  const btn=document.getElementById('leave-submit-btn');
  if(!btn)return;
  const leaveDays=S.leaveFrom&&S.leaveTo?Math.max(0,Math.round((new Date(S.leaveTo)-new Date(S.leaveFrom))/(86400000))+1):0;
  const al=S.user?.annualLeave||0;
  const cl=S.user?.casualLeave||0;
  const bad=!S.leaveType||!S.leaveFrom||!S.leaveTo||!S.leaveReason||
    (S.leaveType==='Annual Leave'&&leaveDays>al)||
    (S.leaveType==='Casual Leave'&&leaveDays>cl)||
    (S.leaveType==='Sick Leave'&&(leaveDays>2||leaveDays>al));
  btn.disabled=bad;
}
async function submitLeave(){
  S.loading=true;render();

  S.loading=false;S.leaveType='';S.leaveFrom='';S.leaveTo='';S.leaveReason='';
  go('s-leave-done');
}

async function loadManagerData(){
  if(isBackendSet()){
    const [ro,rl,ra]=await Promise.all([
      api({action:'getOrders'}),
      api({action:'getLeaves'}),
      api({action:'getAttendance',date:today()})
    ]);
    if(ro?.orders){S.allRationOrders=ro.orders;S.pendingOrders=ro.orders.filter(r=>(r['Status']||r.status||'')==='Pending');}
    if(rl?.leaves){S.allMgrLeaves=rl.leaves;S.pendingLeaves=rl.leaves.filter(l=>(l.status||l['Status']||'')==='Pending');}

    S.pendingOrders=getDemoOrders();
    S.pendingLeaves=getDemoLeaves();

}

function renderMgrRationTab(){
  if(!S.pendingOrders.length)return`<div class="empty"><div class="empty-icon">📋</div><div>No pending ration orders</div></div>`;
  // Group by order ID
  const grouped={};

    const id=r['Order ID']||r.orderId;

    grouped[id].items.push({name:r['Item']||r.name,qty:r['Quantity']||r.qty,unit:r['Unit']||r.unit,supplier:r['Supplier']||r.sup});
  });
  return Object.values(grouped).map(o=>{
    const isOpen=S.catOpen[o.id];

      <div class="req-hdr" onclick="S.catOpen['${esc(o.id)}']=!S.catOpen['${esc(o.id)}'];render()">
        <div>
          <div class="req-id">${esc(o.id)}</div>
          <div class="req-meta">📍 ${esc(o.loc)} · 👤 ${esc(o.staff)} · 📅 ${fmtDate(o.delivery)}
          ${o.urgency==='Urgent'?` <span class="badge b-warn">URGENT</span>`:''}</div>
          ${o.eventName?`<div class="req-meta">🎉 ${esc(o.eventName)} · ${esc(o.pax)} PAX</div>`:''}
        </div>
        <span class="badge b-warn">Pending</span>
      </div>
      <div class="req-body ${isOpen?'o':''}">
        <div class="card-ttl" style="margin-bottom:8px">Review Items — edit qty or ✗ to reject</div>
        ${o.items.map((it,i)=>{
          const edKey=o.id+'|'+it.name;
          const rej=S.reviewRejects[edKey];
          const qty=S.reviewEdits[edKey]!=null?S.reviewEdits[edKey]:it.qty;
          return`<div class="rev-row ${rej?'rejected':''}">
            <span class="rv-name">${esc(it.name)}</span>
            <input class="rv-qty-inp" type="number" value="${rej?0:qty}" min="0" ${rej?'disabled':''} oninput="S.reviewEdits['${esc(edKey)}']=parseFloat(this.value)||0">
            <span class="rv-unit">${esc(it.unit)}</span>
            <button class="rv-reject ${rej?'on':''}" title="${rej?'Restore':'Reject item'}" onclick="toggleReject('${esc(edKey)}')">${rej?'↩':'✗'}</button>

          <button class="btn btn-red btn-sm" onclick="mgrDecision('${esc(o.id)}','Rejected')">✗ Reject All</button>
          <button class="btn btn-ok btn-sm" onclick="mgrDecision('${esc(o.id)}','Manager Approved')">✓ Approve & Forward</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleReject(key){S.reviewRejects[key]=!S.reviewRejects[key];render();}

async function mgrDecision(orderId,status){
  S.loading=true;render();
  const edits=S.reviewEdits;const rejects=S.reviewRejects;
  const note=S.reviewNote;
  await apiData('updateOrderStatus',{orderId,status,managerEdits:edits,managerRejects:rejects,managerNote:note});
  // Remove from pending
  S.pendingOrders=S.pendingOrders.filter(r=>(r['Order ID']||r.orderId)!==orderId);
  S.reviewEdits={};S.reviewRejects={};S.reviewNote='';S.catOpen[orderId]=false;
  S.loading=false;render();
}

  return`<div class="card"><div class="card-ttl">Today's Attendance — ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>

async function logAttendance(type){
  const timeStr=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  if(type==='in'){
    S.todayAtt={inTime:timeStr,outTime:'',date:today()};
  } else {
    S.todayAtt={...S.todayAtt,outTime:timeStr};
  }
  lsS('fb_att_'+today(),S.todayAtt);
  await apiData('logAttendance',{userId:S.user.userId,staffName:S.user.name,location:S.user.location,date:today(),...S.todayAtt,type});
  render();
}

function renderMgrRationApprovals(){
  // Show ALL orders with color codes (yellow=pending, green=approved, red=rejected)
  const src=S.allRationOrders&&S.allRationOrders.length?S.allRationOrders:S.pendingOrders;
  const grouped={};
  src.forEach(r=>{
    const id=r['Order ID']||r.orderId;
    const st=r['Status']||r.status||'Pending';
    if(!grouped[id])grouped[id]={id,date:r['Created Date']||r.createdDate||r['Delivery Date']||r.deliveryDate,staff:r['Staff Name']||r.staffName,loc:r['Location']||r.location,type:r['Order Type']||r.orderType||'Restaurant',pax:r['PAX']||r.pax,eventName:r['Event Name']||r.eventName,eventTime:r['Event Time']||r.eventTime,status:st,items:[]};
    grouped[id].items.push({name:r['Item']||r.name,qty:r['Quantity']||r.qty,unit:r['Unit']||r.unit,supplier:r['Supplier']||r.sup});
  });
  const evOrders=(S.upcomingEvents||[]).filter(e=>['ration_submitted','manager_approved','manager_rejected','admin_approved','admin_rejected'].includes(e.status));
  const allOrders=[...Object.values(grouped).sort((a,b)=>new Date(b.date)-new Date(a.date)),...evOrders.map(e=>({id:e.eventId,date:e.eventDate,staff:e.submittedBy||'—',loc:e.location||e.eventLocation,type:'Catering',pax:e.pax,eventName:e.eventType+' — '+e.clientName,eventTime:e.eventTime||e.mealSlot,status:e.status==='ration_submitted'?'Pending':e.status==='manager_approved'||e.status==='admin_approved'?'Approved':'Rejected',isEvent:true,eventId:e.eventId,items:[]}))];
  const stColorR=st=>st==='Pending'?'#f59e0b':st==='Manager Approved'||st==='Admin Approved'||st==='Approved'?'#16a34a':'#dc2626';
  const stBgR=st=>st==='Pending'?'#fef9c3':st==='Manager Approved'||st==='Admin Approved'||st==='Approved'?'#dcfce7':'#fee2e2';
  const stLabelR=st=>st==='Pending'?'⏳ Pending':st==='Manager Approved'?'✅ Mgr Approved':st==='Admin Approved'||st==='Approved'?'✅ Approved':'❌ Rejected';
  if(!allOrders.length)return`<div class="scr on"><div class="empty"><div class="empty-icon">📋</div><div>No ration orders found</div></div><button class="btn btn-out btn-sm" style="margin-top:12px" onclick="go('m-home')">← Back</button></div>`;
  return`<div class="scr on scr-wide">
    <div class="card-ttl" style="margin-bottom:12px;font-size:16px">📋 Pending Ration Approvals</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span style="background:#fef9c3;color:#92400e;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">⏳ Pending</span>
      <span style="background:#dcfce7;color:#16a34a;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">✅ Approved</span>
      <span style="background:#fee2e2;color:#dc2626;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">❌ Rejected</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:700px">
    ${allOrders.map((o,i)=>{
      const isEv=o.isEvent;
      const st=o.status||'Pending';
      const isPending=st==='Pending';
      return`<div style="background:#fff;border:2px solid ${stColorR(st)};border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;color:var(--muted);margin-bottom:3px">#${i+1} · ${fmtDate(o.date)} <span style="background:${stBgR(st)};color:${stColorR(st)};border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;margin-left:4px">${stLabelR(st)}</span></div>
          <div style="font-weight:700;font-size:14px;margin-bottom:2px">${esc(o.staff)}</div>
          <div style="font-size:12px;color:var(--muted)">
            <span style="background:${o.type==='Catering'?'#ede9fe':o.type==='Staff Ration'?'#d1fae5':'#f0f2fa'};color:${o.type==='Catering'?'#5b21b6':o.type==='Staff Ration'?'#065f46':'var(--navy)'};border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700">${esc(o.type)}</span>
            ${o.type==='Catering'?` · 👥 ${esc(o.pax)} PAX`:''}
          </div>
          ${o.eventName?`<div style="font-size:12px;color:var(--muted);margin-top:3px">🎉 ${esc(o.eventName)}${o.eventTime?' · ⏰ '+esc(o.eventTime):''}</div>`:''}
          ${o.loc?`<div style="font-size:12px;color:var(--muted);margin-top:2px">📍 ${esc(o.loc)}</div>`:''}
        </div>
        <div style="flex-shrink:0">
          ${isPending?(isEv
            ?`<button class="btn btn-sm" style="background:#0a2240;color:#fff;border:none;cursor:pointer;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700" onclick="S.mRationDetailId='${esc(o.eventId)}';S.mRationDetailType='event';go('m-ration-detail')">Review</button>`
            :`<button class="btn btn-sm" style="background:#0a2240;color:#fff;border:none;cursor:pointer;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700" onclick="S.mRationDetailId='${esc(o.id)}';S.mRationDetailType='regular';go('m-ration-detail')">Review</button>`
          ):`<span style="font-size:11px;color:var(--muted)">—</span>`}
        </div>
      </div>`;

    <button class="btn btn-out btn-sm" style="margin-top:16px" onclick="go('m-home')">← Back to Home</button>

}

function renderMgrRationDetail(){
  const isEvent=S.mRationDetailType==='event';
  if(isEvent){
    const ev=(S.upcomingEvents||[]).find(e=>e.eventId===S.mRationDetailId);
    if(!ev)return`<div class="scr on"><p>Not found.</p><button class="btn btn-out" onclick="go('m-ration-approvals')">← Back</button></div>`;
    return`<div class="scr on scr-wide">
      <div class="card">
        <div class="card-ttl">[${esc(ev.eventCode)}] ${esc(ev.eventType)} — ${esc(ev.clientName)}</div>
        <div style="font-size:13px;color:var(--muted);margin:4px 0 10px">📅 ${fmtDate(ev.eventDate)} · 🍽 ${esc(ev.mealSlot||'—')} · 👥 ${esc(ev.pax)} pax · 📍 ${esc(ev.location||'—')}</div>
        ${renderCevRationItems(ev)}
      </div>
      <textarea class="ft" rows="2" placeholder="Manager note (optional)…" oninput="S.reviewNote=this.value" style="margin-bottom:10px">${esc(S.reviewNote||'')}</textarea>
      <div class="btn-row">
        <button class="btn btn-red btn-sm" onclick="mgrEvDecision('${esc(ev.eventId)}','manager_rejected')">✗ Reject</button>
        <button class="btn btn-sm" style="background:#f59e0b;color:#fff;border:none;cursor:pointer;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700" onclick="mgrEvDecision('${esc(ev.eventId)}','event_created')">✏️ Request Changes</button>
        <button class="btn btn-ok btn-sm" onclick="mgrEvDecision('${esc(ev.eventId)}','manager_approved')">✓ Approve & Forward</button>
      </div>
      <button class="btn btn-out btn-sm" style="margin-top:10px" onclick="go('m-ration-approvals')">← Back</button>
    </div>`;
  }
  // Regular order detail
  const id=S.mRationDetailId;
  const _ordSrc=S.allRationOrders&&S.allRationOrders.length?S.allRationOrders:S.pendingOrders;
  const orderRows=_ordSrc.filter(r=>(r['Order ID']||r.orderId)===id);
  if(!orderRows.length)return`<div class="scr on"><p>Order not found.</p><button class="btn btn-out" onclick="go('m-ration-approvals')">← Back</button></div>`;
  const o=orderRows[0];
  return`<div class="scr on scr-wide">
    <div class="card">
      <div class="card-ttl">Order ${esc(id)}</div>
      <div style="font-size:13px;color:var(--muted);margin:4px 0 10px">👤 ${esc(o['Staff Name']||o.staffName)} · 📍 ${esc(o['Location']||o.location)} · 📅 ${fmtDate(o['Delivery Date']||o.deliveryDate)}</div>
      <div class="card-ttl" style="font-size:12px;margin-bottom:8px">Review Items — edit qty or ✗ to reject</div>
      ${orderRows.map(r=>{
        const it={name:r['Item']||r.name,qty:r['Quantity']||r.qty,unit:r['Unit']||r.unit};
        const edKey=id+'|'+it.name;
        const rej=S.reviewRejects[edKey];
        const qty=S.reviewEdits[edKey]!=null?S.reviewEdits[edKey]:it.qty;
        return`<div class="rev-row ${rej?'rejected':''}">
          <span class="rv-name">${esc(it.name)}</span>
          <input class="rv-qty-inp" type="number" value="${rej?0:qty}" min="0" ${rej?'disabled':''} oninput="S.reviewEdits['${esc(edKey)}']=parseFloat(this.value)||0">
          <span class="rv-unit">${esc(it.unit)}</span>
          <button class="rv-reject ${rej?'on':''}" title="${rej?'Restore':'Reject item'}" onclick="toggleReject('${esc(edKey)}')">${rej?'↩':'✗'}</button>
        </div>`;
      }).join('')}
      <label class="fl">Manager Note</label>
      <textarea class="ft" rows="2" placeholder="Add note for admin…" oninput="S.reviewNote=this.value">${esc(S.reviewNote||'')}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-red btn-sm" onclick="mgrDecision('${esc(id)}','Rejected');go('m-ration-approvals')">✗ Reject All</button>
      <button class="btn btn-ok btn-sm" onclick="mgrDecision('${esc(id)}','Manager Approved');go('m-ration-approvals')">✓ Approve & Forward</button>
    </div>
    <button class="btn btn-out btn-sm" style="margin-top:10px" onclick="S.reviewEdits={};S.reviewRejects={};S.reviewNote='';go('m-ration-approvals')">← Back</button>
  </div>`;
}

function renderCevRationItems(ev){
  const items=ev.rationItems||{};
  let rows='';let total=0;
  Object.entries(items).forEach(([k,v])=>{
    if(Array.isArray(v))v.forEach(it=>{if(it&&it.qty>0){rows+=`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f0f0f0"><span>${esc(it.name)}</span><span style="font-weight:700">${esc(it.qty)} ${esc(it.unit||'')}</span></div>`;total++;}});
    else if(v&&typeof v==='object'&&v.qty>0){rows+=`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f0f0f0"><span>${esc(k.split('|')[2]||k)}</span><span style="font-weight:700">${esc(v.qty)} ${esc(v.unit||'')}</span></div>`;total++;}
    else if(v&&typeof v==='object')Object.entries(v).forEach(([name,it])=>{if(it&&it.qty>0){rows+=`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f0f0f0"><span>${esc(name)}</span><span style="font-weight:700">${esc(it.qty)} ${esc(it.unit||'')}</span></div>`;total++;}});
  });
  return total?`<div style="margin-top:8px"><div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px">Ration Items (${total})</div>${rows}</div>`:`<div style="font-size:12px;color:var(--muted)">No ration items in this order.</div>`;
}

async function mgrEvDecision(eventId,newStatus){
  S.loading=true;render();
  const note=S.reviewNote||'';
  await apiData('updateCateringEventStatus',{eventId,status:newStatus,managerNote:note});
  const idx=(S.upcomingEvents||[]).findIndex(e=>e.eventId===eventId);
  if(idx>=0){S.upcomingEvents[idx].status=newStatus;if(note)S.upcomingEvents[idx].managerNote=note;}
  S.reviewNote='';S.loading=false;
  go('m-ration-approvals');
}

function renderMgrLeaveApprovals(){
  const allMgrLv=S.allMgrLeaves&&S.allMgrLeaves.length?S.allMgrLeaves:S.pendingLeaves;
  const stCL=st=>st==='Pending'?'#f59e0b':st==='Approved'?'#16a34a':'#dc2626';
  const stBL=st=>st==='Pending'?'#fef9c3':st==='Approved'?'#dcfce7':'#fee2e2';
  return`<div class="scr on scr-wide">
    <div class="card-ttl" style="margin-bottom:12px;font-size:16px">🗓️ Leave Approval Requests</div>
    ${!allMgrLv.length?`<div class="empty"><div class="empty-icon">🗓️</div><div>No leave requests found</div></div>`:''}
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span style="background:#fef9c3;color:#92400e;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">⏳ Pending</span>
      <span style="background:#dcfce7;color:#16a34a;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">✅ Approved</span>
      <span style="background:#fee2e2;color:#dc2626;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700">❌ Rejected</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:700px">
    ${allMgrLv.map(l=>{
      const staffData=(S.allStaff||[]).find(u=>u.userId===l.userId||u.userId===l['User ID'])||{};
      const al=+(staffData.annualLeave||l.annualLeaveBalance||staffData['Annual Leave']||0);
      const cl=+(staffData.casualLeave||l.casualLeaveBalance||staffData['Casual Leave']||0);
      const fromD=l.fromDate||l['From Date']||'';
      const toD=l.toDate||l['To Date']||'';
      const days=fromD&&toD?Math.max(0,Math.round((new Date(toD)-new Date(fromD))/86400000)+1):0;
      const lType=l.leaveType||l['Leave Type']||'';
      const isAnnual=lType.toLowerCase().includes('annual');
      const lSt=l.status||l['Status']||'Pending';
      return`<div style="background:#fff;border:2px solid ${stCL(lSt)};border-radius:12px;padding:14px 16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-weight:700;font-size:14px">${esc(l.staffName||l['Staff Name']||'—')}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">📍 ${esc(l.location||l['Location']||'—')}</div>
          </div>
          <span style="background:${stBL(lSt)};color:${stCL(lSt)};border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700">${esc(lSt)}</span>
        </div>
        <div style="font-size:13px;margin-bottom:6px">
          <span style="background:${isAnnual?'#ede9fe':'#fee2e2'};color:${isAnnual?'#5b21b6':'#dc2626'};border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700">${esc(lType)}</span>
          &nbsp; 📅 ${fmtDate(fromD)} → ${fmtDate(toD)} ${days>0?`<strong>(${days} day${days>1?'s':''})</strong>`:''}
        </div>
        ${l.reason||l['Reason']?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${esc(l.reason||l['Reason'])}</div>`:''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px">
          <div style="background:#f0f2fa;border-radius:8px;padding:8px 10px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:var(--navy)">${al.toFixed(1)}</div>
            <div style="font-size:10px;color:var(--muted);font-weight:600">Annual Balance</div>
          </div>
          <div style="background:#fff5f5;border-radius:8px;padding:8px 10px;text-align:center">
            <div style="font-size:18px;font-weight:900;color:#dc2626">${cl.toFixed(1)}</div>
            <div style="font-size:10px;color:var(--muted);font-weight:600">Casual Balance</div>
          </div>
        </div>
        ${isAnnual&&days>al?`<div class="alert alert-warn" style="font-size:12px;margin-bottom:8px">⚠️ Requested ${days} day(s) but only ${al} annual leave days available.</div>`:''}
        ${lSt==='Pending'?`<input class="fi" placeholder="Optional note to staff…" id="mla-${esc(l.leaveId)}" style="margin-bottom:8px">
        <div class="btn-row">
          <button class="btn btn-red btn-sm" onclick="decideLeavePage('${esc(l.leaveId)}','Rejected')">✗ Reject</button>
          <button class="btn btn-ok btn-sm" onclick="decideLeavePage('${esc(l.leaveId)}','Approved')">✓ Approve</button>
        </div>`:''}
      </div>`;
    }).join('')}
    </div>
    <button class="btn btn-out btn-sm" style="margin-top:16px" onclick="go('m-home')">← Back to Home</button>
  </div>`;
}

async function decideLeavePage(leaveId,status){
  const note=document.getElementById('mla-'+leaveId)?.value||'';
  await apiData('updateLeave',{leaveId,status,managerNote:note});
  S.pendingLeaves=S.pendingLeaves.filter(l=>l.leaveId!==leaveId);
  render();
}

async function admEvDecision(eventId,newStatus){
  S.loading=true;render();
  const note=S.reviewNote||'';
  const evBefore=(S.upcomingEvents||[]).find(e=>e.eventId===eventId);
  await apiData('updateCateringEventStatus',{eventId,status:newStatus,adminNote:note});
  const idx=(S.upcomingEvents||[]).findIndex(e=>e.eventId===eventId);
  if(idx>=0){S.upcomingEvents[idx].status=newStatus;if(note)S.upcomingEvents[idx].adminNote=note;}
  S.reviewNote='';S.loading=false;
  if(newStatus==='admin_approved'&&evBefore){
    const rationItems=evBefore.rationItems||{};
    const allItems=Object.values(rationItems).flat().filter(i=>i.qty>0);
    S.admJustApproved={
      type:'event',eventId,
      eventCode:evBefore.eventCode||'',
      eventType:evBefore.eventType||'',
      clientName:evBefore.clientName||'',
      location:evBefore.location||'',
      deliveryDate:evBefore.eventDate||'',
      mealSlot:evBefore.mealSlot||'',
      pax:evBefore.pax||'',
      note:note||evBefore.managerNote||'',
      items:allItems.map(i=>({name:i.name,qty:i.qty,unit:i.unit||'KG'}))
    };
    go('a-ration-detail');
  } else {
    go('a-ration-approvals');
  }
}

async function admOrderDecision(orderId,status){
  S.loading=true;render();
  const note=S.reviewNote||'';
  // Capture order data before removing from list (for WhatsApp/print)
  const orderRows=S.approvedOrders.filter(r=>(r['Order ID']||r.orderId)===orderId);
  await apiData('updateOrderStatus',{orderId,status,adminNote:note});
  S.approvedOrders=S.approvedOrders.filter(r=>(r['Order ID']||r.orderId)!==orderId);
  S.reviewNote='';S.loading=false;
  if(status==='Admin Approved'&&orderRows.length){
    const o=orderRows[0];
    S.admJustApproved={
      type:'order',orderId,
      requestor:o['Staff Name']||o.staffName||'',
      location:o['Location']||o.location||'',
      deliveryDate:o['Delivery Date']||o.deliveryDate||'',
      deliveryTime:o['Delivery Time']||o.deliveryTime||'',
      note:note||o['Manager Note']||o.managerNote||'',
      items:orderRows.map(r=>({name:r['Item']||r.name,qty:r['Quantity']||r.qty,unit:r['Unit']||r.unit}))
    };
    go('a-ration-detail');
  } else {
    go('a-ration-approvals');
  }
}

async function loadAdminData(){
  if(isBackendSet()){
    const [ro,rs,rl,rloc,ra]=await Promise.all([
      api({action:'getOrders'}),
      api({action:'getStaff'}),
      api({action:'getLeaves'}),
      api({action:'getLocations'}),
      api({action:'getAttendance',date:today()})
    ]);
    if(ro?.orders){S.allRationOrders=ro.orders;S.approvedOrders=ro.orders.filter(r=>(r['Status']||r.status||'')==='Manager Approved');}
    if(rs?.staff) S.allStaff=rs.staff;
    if(rl?.leaves) S.allLeaves=rl.leaves;
    if(rloc?.locations) S.allLocations=rloc.locations;
    if(ra?.records) S.admTodayAtt=ra.records;
  } else {
    S.approvedOrders=getDemoApproved();
    S.allRationOrders=[...getDemoApproved(),...S.approvedOrders];
    S.allStaff=lsG('fb_custom_staff',null)||getDemoStaff();
    S.allLeaves=getDemoLeaves();
    S.allLocations=lsG('fb_custom_locations',null)||DEMO_LOCATIONS.slice();
    S.admTodayAtt=getDemoAtt();
  }
  await loadCateringEvents();
  saveToCache(S.user?.userId);
}

          ${totalItems?`<div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--navy)">Ration Items to Procure (${totalItems}):</div>
          ${Object.entries(bySup2).map(([sup,its])=>`<div style="background:#f8f9ff;border-radius:7px;padding:8px 10px;margin-bottom:5px">
            <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px">${SUP_META[sup]?.e||''}${SUP_META[sup]?.l?' '+SUP_META[sup].l:sup}</div>

  ;

function exportPO(){
  const rows=S.approvedOrders.map(r=>[r['Order ID']||r.orderId,r['Supplier']||r.sup,r['Item']||r.name,r['Quantity']||r.qty,r['Unit']||r.unit,r['Location']||r.location,r['Delivery Date']||r.deliveryDate].join(','));

/* Monthly Salary / Attendance Report */
function renderAdmMonthlyReport(){
  const now=new Date();
  const selMonth=S.reportMonth||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  const useDateRange=!!(S.reportFrom&&S.reportTo);
  const inRange=dateStr=>{
    if(!dateStr)return false;
    if(useDateRange){return dateStr>=S.reportFrom&&dateStr<=S.reportTo;}
    return dateStr.startsWith(selMonth);
  };
  const monthLeaves=S.allLeaves.filter(l=>{
    if((l.status||l['Status']||'')!=='Approved')return false;
    return inRange(l.fromDate||l['From Date']||'');
  });
  const liveStaff=S.allStaff.length?S.allStaff:DEMO_USERS;
  const staffRows=liveStaff.filter(u=>(u.role||u['Role'])!=='admin').map(u=>{
    const uid=u.userId||u['User ID'];
    const uLeaves=monthLeaves.filter(l=>(l.userId||l['User ID'])===uid);
    let annualDays=0,casualDays=0;
    uLeaves.forEach(l=>{
      const fd=new Date(l.fromDate||l['From Date']);
      const td=new Date(l.toDate||l['To Date']);
      const days=Math.max(0,Math.round((td-fd)/86400000)+1);
      if((l.leaveType||l['Leave Type']||'').toLowerCase().includes('annual'))annualDays+=days;
      else casualDays+=days;
    });
    return{...u,name:u.name||u['Name'],location:u.location||u['Location'],profile:u.profile||u['Profile']||'',annualDays,casualDays};
  });
  // Ration orders for this period
  const allOrd=S.allRationOrders&&S.allRationOrders.length?S.allRationOrders:S.approvedOrders;
  const rationRows=allOrd.filter(r=>{
    const d=r['Delivery Date']||r.deliveryDate||r['Created Date']||r.createdDate||'';
    const ds=d.toString().slice(0,10);
    return inRange(ds);

  const rationCsvRows=rationRows.map(r=>[

    '"'+(r['Staff Name']||r.staffName||'—').replace(/"/g,'""')+'"',

  const rationCsv='Category,Item,Qty,Unit,Who Ordered,Date,Delivery Location,Order Status\n'+rationCsvRows.join('\n');
  const periodLabel=useDateRange?S.reportFrom+' to '+S.reportTo:selMonth;
  const leaveCsvRows=staffRows.map(r=>[r.name,r.location,r.profile,periodLabel,r.annualDays,r.casualDays,r.annualDays+r.casualDays,r.casualDays>0?'Deduct '+r.casualDays+' day(s)':'No Deduction'].join(','));
  const leaveCsv='Name,Location,Designation,Period,Annual Leave Days,Casual Leave Days,Total Leave Days,Salary Action\n'+leaveCsvRows.join('\n');
  return`<div>
    <h3 style="font-size:14px;font-weight:700;margin-bottom:10px">📊 Monthly Report — Leaves & Rations</h3>
    <div style="display:flex;gap:9px;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap">

        <input type="month" class="fi" style="width:auto;min-width:140px" value="${selMonth}" oninput="S.reportMonth=this.value;S.reportFrom='';S.reportTo='';render()">
      </div>
      <div style="font-size:12px;color:var(--muted);align-self:center;padding-bottom:2px">or date range:</div>
      <div>
        <label class="fl" style="margin-bottom:3px">From</label>
        <input type="date" class="fi" style="width:auto;min-width:130px" value="${S.reportFrom||''}" oninput="S.reportFrom=this.value;render()">
      </div>
      <div>

        <input type="date" class="fi" style="width:auto;min-width:130px" value="${S.reportTo||''}" oninput="S.reportTo=this.value;render()">
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <a href="data:text/csv;charset=utf-8,${encodeURIComponent(leaveCsv)}" download="Flenbo_Leaves_${periodLabel}.csv"
         style="display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:var(--navy);color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">⬇ Export Leave CSV</a>
      <a href="data:text/csv;charset=utf-8,${encodeURIComponent(rationCsv)}" download="Flenbo_Rations_${periodLabel}.csv"
         style="display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:#0284c7;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none">⬇ Export Ration CSV</a>

function addCustomItem(){
  const sup=document.getElementById('ni-sup')?.value||'CUSTOM';
  const name=document.getElementById('ni-name')?.value?.trim();
  const unit=document.getElementById('ni-unit')?.value||'KG';
  if(!name){alert('Please enter item name.');return;}
  const custom=lsG('fb_custom_items',[]);
  if(custom.find(i=>i.name.toLowerCase()===name.toLowerCase())){alert('Item already exists.');return;}
  const supLabel=(SUP_META[sup]?.l||sup);
  custom.push({sup,cat:supLabel,name,unit,custom:true});
  lsS('fb_custom_items',custom);
  render();
}

function removeCustomItem(idx){
  if(!confirm('Remove this item?'))return;
  const custom=lsG('fb_custom_items',[]);
  custom.splice(idx,1);
  lsS('fb_custom_items',custom);
  render();
}

async function submitAdminLeave(){
  if(!S.admLeaveStaff||!S.admLeaveType||!S.admLeaveFrom||!S.admLeaveTo||!S.admLeaveReason)return;
  const _ls4=S.allStaff.length?S.allStaff:DEMO_USERS;
  const target=_ls4.find(u=>(u.userId||u['User ID'])===S.admLeaveStaff);
  const leave={
    leaveId:'LV-ADM-'+Date.now(),
    userId:S.admLeaveStaff,
    staffName:target?(target.name||target['Name']):S.admLeaveStaff,
    location:target?(target.location||target['Location']||''):'',
    leaveType:S.admLeaveType,
    fromDate:S.admLeaveFrom,
    toDate:S.admLeaveTo,
    reason:S.admLeaveReason,
    submittedAt:new Date().toISOString(),
    status:S.admLeaveStatus||'Approved',
    managerNote:'Recorded by Admin'
  };
  S.loading=true;render();
  await apiData('submitLeave',leave);
  S.loading=false;
  S.admLeaveStaff='';S.admLeaveType='';S.admLeaveFrom='';S.admLeaveTo='';S.admLeaveReason='';S.admLeaveStatus='Approved';
  alert('✅ Leave recorded successfully for '+leave.staffName);
  await loadAdminData();
  render();
}

function getLocalCateringEvents(){
  const all=lsG('fb_catering_events',[]);
  const t=today();
  return all.filter(e=>e.eventDate>=t).sort((a,b)=>a.eventDate.localeCompare(b.eventDate));
}

async function loadCateringEvents(){
  if(isBackendSet()){
    const r=await api({action:'getCateringEvents'});
    if(r?.events){
      // backend returns all events; filter to upcoming on client
      const t=today();
      // Show events with no date, future events, and events from last 30 days (for Details access)
      const t30=new Date();t30.setDate(t30.getDate()-30);const t30s=t30.toISOString().slice(0,10);
      S.upcomingEvents=r.events.filter(e=>!e.eventDate||e.eventDate>=t30s).sort((a,b)=>(a.eventDate||'').localeCompare(b.eventDate||''));
      // Sync localStorage so every device has fresh fallback (fixes cross-device delete sync bug)
      lsS('fb_catering_events', S.upcomingEvents);
    } else {
      S.upcomingEvents=getLocalCateringEvents();
    }
  } else {
    S.upcomingEvents=getLocalCateringEvents();
  }
}

function daysUntil(dateStr){
  if(!dateStr)return null;
  const diff=Math.round((new Date(dateStr+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000);
  return diff;
}

// Delete event
async function cevDelete(eventId){
  if(!confirm('Delete this event permanently?'))return;
  if(isBackendSet()){
    const r=await apiData('deleteCateringEvent',{eventId});
    if(!r?.success){alert('Delete failed: '+(r?.error||'error'));return;}

  S.upcomingEvents=(S.upcomingEvents||[]).filter(e=>e.eventId!==eventId);
  const cached=lsG('fb_catering_events',[]).filter(e=>e.eventId!==eventId);
  lsS('fb_catering_events',cached);

}

async function cevSave(){
  const f=S.cevForm;
  const isEdit=!!S.cevEditId;
  const payload={eventType:f.type,mealSlot:f.mealSlot,eventDate:f.date,eventTime:f.time,pax:f.pax,clientName:f.clientName,clientMobile:f.clientMobile,location:f.location,menu:S.cevMenu,foodPrefs:f.foodPrefs||[],createdBy:S.user?.name||''};
  S.loading=true; render();
  try{
    if(isEdit){
      if(isBackendSet()){
        const r=await apiData('updateCateringEvent',{...payload,eventId:S.cevEditId});
        if(!r?.success){alert('Save failed: '+(r?.error||'error'));S.loading=false;render();return;}
      }
      const idx=(S.upcomingEvents||[]).findIndex(e=>e.eventId===S.cevEditId);
      if(idx>=0) Object.assign(S.upcomingEvents[idx],{eventType:f.type,mealSlot:f.mealSlot,eventDate:f.date,eventTime:f.time,pax:f.pax,clientName:f.clientName,clientMobile:f.clientMobile,location:f.location,menu:S.cevMenu});
    } else {
      let evId,evCode;
      if(isBackendSet()){
        const r=await apiData('createCateringEvent',payload);
        if(!r?.success){alert('Failed: '+(r?.error||'error'));S.loading=false;render();return;}
        evId=r.eventId; evCode=r.eventCode;
      } else {
        evCode=String(1000+((S.upcomingEvents||[]).length));
        evId='CEV-'+evCode+'-'+Date.now();
      }
      const newEv={eventId:evId,eventCode:evCode,eventType:f.type,mealSlot:f.mealSlot,eventDate:f.date,eventTime:f.time,pax:f.pax,clientName:f.clientName,clientMobile:f.clientMobile,location:f.location,menu:S.cevMenu,status:'event_created',createdBy:S.user?.name||''};
      if(!S.upcomingEvents)S.upcomingEvents=[];
      S.upcomingEvents.push(newEv);
      const cached=lsG('fb_catering_events',[]);cached.push(newEv);lsS('fb_catering_events',cached);
    }
    S.loading=false;
    alert(isEdit?'Event updated!':'Event created! Staff can now order ration.');
    const role=S.user?.role;
    S.cevEditId=null;
    go(role==='admin'?'a-home':'m-home');
  } catch(err){S.loading=false;alert('Error: '+err.message);render();}
}

// ── STAFF RATION ORDER FOR EVENT ────────────────────────────
function renderCevRation(){

    <div class="card" style="background:linear-gradient(135deg,var(--purple2),#4c1d95);color:#fff;margin-bottom:12px">

      <div style="font-size:12px;opacity:.85">📅 ${fmtDate(ev.eventDate)} · 🍽 ${esc(ev.mealSlot||'—')} · 👥 ${esc(ev.pax)} pax · 📍 ${esc(ev.location||'—')}</div>
    </div>
    <div class="card">
      <div class="card-ttl">🧺 Select Ration Items <span style="font-size:12px;font-weight:400;color:var(--muted)">${totalItems} added</span></div>
      <div style="overflow-x:auto;white-space:nowrap;margin-bottom:12px;padding-bottom:2px">

          const nm=Object.keys(ITEMS[k]||{})[0]||k;
          const cnt=Object.values(cart[k]||{}).filter(v=>v.qty&&parseFloat(v.qty)>0).length;
          return`<button onclick="S.cevRationCatTab='${k}';render()" style="display:inline-block;margin-right:6px;padding:6px 12px;border-radius:20px;border:1.5px solid ${S.cevRationCatTab===k?'var(--navy)':'var(--border)'};background:${S.cevRationCatTab===k?'var(--navy)':'var(--card)'};color:${S.cevRationCatTab===k?'#fff':'var(--txt)'};font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">

      <div style="font-weight:700;font-size:12px;color:var(--navy);margin-bottom:8px">${Object.keys(ITEMS[activeKey]||{})[0]||activeKey}</div>
      ${activeItems.map(([itemName,defUnit])=>{
        const v=(cart[activeKey]&&cart[activeKey][itemName])||{qty:'',unit:defUnit};
        const hasQty=v.qty&&parseFloat(v.qty)>0;
        return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1;font-size:13px;font-weight:${hasQty?700:400};color:${hasQty?'var(--navy)':'var(--txt)'}">${esc(itemName)}</div>
          <input type="number" min="0" step="0.1" placeholder="Qty" value="${esc(v.qty)}"
            oninput="if(!S.cevRationCart['${activeKey}'])S.cevRationCart['${activeKey}']={};if(!S.cevRationCart['${activeKey}']['${esc(itemName)}'])S.cevRationCart['${activeKey}']['${esc(itemName)}']={qty:'',unit:'${esc(defUnit)}'};S.cevRationCart['${activeKey}']['${esc(itemName)}'].qty=this.value"
            style="width:70px;border:1.5px solid ${hasQty?'var(--navy)':'var(--border)'};border-radius:8px;padding:5px 8px;font-size:13px;text-align:center">
          <select onchange="if(!S.cevRationCart['${activeKey}'])S.cevRationCart['${activeKey}']={};if(!S.cevRationCart['${activeKey}']['${esc(itemName)}'])S.cevRationCart['${activeKey}']['${esc(itemName)}']={qty:'',unit:'${esc(defUnit)}'};S.cevRationCart['${activeKey}']['${esc(itemName)}'].unit=this.value" style="width:68px;border:1.5px solid var(--border);border-radius:8px;padding:5px 4px;font-size:11px">
            ${UNITS.map(u=>`<option ${v.unit===u?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>`;
      }).join('')}
    </div>
    <div class="btn-row">
      <button class="btn btn-out" onclick="goBack()">← Back</button>
      <button class="btn btn-navy" onclick="cevSubmitRation()" ${!totalItems?'disabled':''}>Submit Ration (${totalItems} items) →</button>
    </div>
  </div>`;
}

async function cevSubmitRation(){
  const ev=(S.upcomingEvents||[]).find(e=>e.eventId===S.cevSelEventId);
  if(!ev){alert('Event not found.');return;}
  const rationItems={};
  Object.entries(S.cevRationCart).forEach(([cat,items])=>{
    Object.entries(items).forEach(([name,v])=>{
      if(v.qty&&parseFloat(v.qty)>0){if(!rationItems[cat])rationItems[cat]={};rationItems[cat][name]={qty:v.qty,unit:v.unit};}
    });
  });
  if(!Object.keys(rationItems).length){alert('Add at least one item.');return;}
  S.loading=true;render();
  try{
    if(isBackendSet()){
      const r=await apiData('submitEventRation',{eventId:ev.eventId,rationItems,submittedBy:S.user?.name||''});
      if(!r?.success){alert('Submit failed: '+(r?.error||'error'));S.loading=false;render();return;}
    }
    const idx=(S.upcomingEvents||[]).findIndex(e=>e.eventId===ev.eventId);
    if(idx>=0){Object.assign(S.upcomingEvents[idx],{status:'ration_submitted',rationItems,submittedBy:S.user?.name||''});}
    S.loading=false;
    alert('Ration submitted! Awaiting Operations Manager approval.');
    go('s-home');
  } catch(err){S.loading=false;alert('Error: '+err.message);render();}
}

      <button class="btn btn-ok" onclick="cevMgrDecide('approved')">✓ Approve</button>
    </div>

}

async function cevMgrDecide(decision){
  const ev=(S.upcomingEvents||[]).find(e=>e.eventId===S.cevSelEventId);
  if(!ev)return;
  if(decision==='rejected'&&!S.cevMgrNote.trim()){alert('Add a note explaining why you are rejecting.');return;}
  if(!confirm(decision==='approved'?'Approve and send to Admin?':'Reject and return to Staff?'))return;
  S.loading=true;render();
  try{
    if(isBackendSet()){
      const r=await apiData('decideEventRation',{eventId:ev.eventId,decision,note:S.cevMgrNote});
      if(!r?.success){alert('Failed: '+(r?.error||'error'));S.loading=false;render();return;}
    }
    const newStatus=decision==='approved'?'manager_approved':'manager_rejected';
    const idx=(S.upcomingEvents||[]).findIndex(e=>e.eventId===ev.eventId);
    if(idx>=0)Object.assign(S.upcomingEvents[idx],{status:newStatus,managerNote:S.cevMgrNote,managerDecision:decision});
    S.loading=false;
    alert(decision==='approved'?'Approved! Sent to Admin.':'Rejected. Staff will be notified.');
    go('m-home');
  } catch(err){S.loading=false;alert('Error: '+err.message);render();}
}

async function cevAdminDecide(decision){

    }
    const newStatus=decision==='approved'?'admin_approved':'admin_rejected';
    const idx=(S.upcomingEvents||[]).findIndex(e=>e.eventId===ev.eventId);
    if(idx>=0)Object.assign(S.upcomingEvents[idx],{status:newStatus,adminNote:S.cevAdminNote,adminDecision:decision});

async function loadUserData(){
  if(!S.user)return;
  const uid=S.user.userId;
  if(isBackendSet()){
    // Run base calls in parallel to reduce cold-start wait
    const [rl,ra]=await Promise.all([
      api({action:'getLeaves',userId:uid}),
      api({action:'getAttendance',userId:uid,date:today()})
    ]);
    if(rl?.leaves)S.myLeaves=rl.leaves;
    if(ra?.record)S.todayAtt=ra.record;
    render(); // refresh UI with fresh data
    if(S.user.role==='manager'||S.user.role==='admin') await loadManagerData();
    if(S.user.role==='admin') await loadAdminData();
    render(); // final render after all data loaded
  }else{
    S.myLeaves=lsG('fb_leaves_'+uid,[]);
    S.todayAtt=lsG('fb_att_'+today(),null);
    if(S.user.role==='manager'||S.user.role==='admin'){
      S.pendingOrders=lsG('fb_demo_orders',[]).filter(o=>o.status==='Pending');
      S.pendingLeaves=getDemoLeaves().filter(l=>l.status==='Pending');
      S.todayAttAll=getDemoAttAll();
    }
    if(S.user.role==='admin'){
      S.approvedOrders=getDemoApproved();
      S.allStaff=lsG('fb_custom_staff',null)||getDemoStaff();
      S.allLeaves=getDemoLeaves();
      S.allLocations=lsG('fb_custom_locations',null)||DEMO_LOCATIONS.slice();
    }
  }
}

// ── SERVICE WORKER REGISTRATION ───────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));
  });
}

window.addEventListener('visibilitychange',()=>{
  // Refresh data when user returns to the app tab/window
  if(document.visibilityState==='visible'&&S.user){
    loadUserData().catch(()=>{});
  }
});
document.addEventListener('DOMContentLoaded',async()=>{
  // Load backend items in background (don't block render)
  loadBackendItems().catch(()=>{});
  const saved=lsG('fb_session',null);
  if(saved){
    S.user=saved;
    loadFromCache(saved.userId); // ← instantly fills stats/events/staff from previous session
    go(homeScreen()); // render <100ms with cached data
    loadUserData().catch(e=>console.warn('Background data load:',e)); // refresh from backend in bg
  }else{
    go('login');
  }
  // Auto-refresh every 60 seconds while logged in
  setInterval(()=>{
    if(S.user&&document.visibilityState==='visible'){
      loadUserData().catch(()=>{});
    }
  },60000);
});
</script>
