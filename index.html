<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Flenbo Hub — Operations Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1A2642;--navy2:#243254;--navy3:#344266;
  --gold:#C9A668;--gold2:#FBF4E6;--gold3:#E8D5A8;
  --bg:#F0F2F8;--card:#fff;--border:#DDE3EE;
  --txt:#1A2642;--muted:#6B7898;--light:#9AA5BF;
  --ok:#166534;--ok-bg:#DCFCE7;--ok2:#16A34A;
  --warn:#92400E;--warn-bg:#FEF3C7;--warn2:#D97706;
  --red:#991B1B;--red-bg:#FEE2E2;--red2:#DC2626;
  --purple:#5B21B6;--purple-bg:#EDE9FE;--purple2:#7C3AED;
  --r:10px;
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;overflow-x:hidden}

/* ── HEADER ── */
.hdr{background:var(--navy);color:#fff;padding:10px 14px;position:sticky;top:0;z-index:300;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-inner{display:flex;align-items:center;gap:10px;max-width:600px;margin:0 auto}
.hdr-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1;flex-shrink:0;opacity:.8}
.hdr-back:hover{opacity:1}
.hdr-brand{flex:1}
.hdr-brand-name{font-size:16px;font-weight:800;letter-spacing:.5px}
.hdr-brand-name span{color:var(--gold,#C9A668)}
.hdr-brand-sub{font-size:10px;opacity:.6;margin-top:1px;letter-spacing:.3px}
.hdr-right{text-align:right;font-size:11px;opacity:.75;flex-shrink:0;line-height:1.5}
.hdr-role{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.role-staff{background:rgba(201,166,104,.2);color:var(--gold)}
.role-manager{background:rgba(91,33,182,.3);color:#c4b5fd}
.role-admin{background:rgba(220,38,38,.25);color:#fca5a5}

/* ── SCREENS ── */
.scr{display:none;padding:14px;max-width:600px;margin:0 auto;padding-bottom:100px}
.scr.on{display:block}
.scr-wide{max-width:960px}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1a1a3e 100%)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-name{font-size:36px;font-weight:900;color:#fff;letter-spacing:2px}
.login-logo-name span{color:var(--gold,#C9A668)}
.login-logo-sub{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.login-divider{width:40px;height:2px;background:var(--gold);margin:12px auto}
.login-card{background:#fff;border-radius:14px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-card-ttl{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:18px;text-align:center}
.login-error{background:var(--red-bg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12px;font-weight:600;margin-bottom:12px;display:none;align-items:center;gap:6px}
.login-error.show{display:flex}

/* ── FORMS ── */
.fl{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:14px 0 5px}
.fl:first-child{margin-top:0}
.fi,.fs,.ft{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-size:14px;color:var(--txt);background:#fff;font-family:inherit;transition:border .15s}
.fi:focus,.fs:focus,.ft:focus{outline:none;border-color:var(--navy)}
.ft{resize:vertical;min-height:80px}
.fi-pw{position:relative}
.fi-pw .fi{padding-right:40px}
.pw-toggle{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted)}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 20px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none;width:100%;transition:all .15s;letter-spacing:.2px;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover:not(:disabled){background:var(--navy2)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover:not(:disabled){background:var(--gold3)}
.btn-out{background:transparent;border:2px solid var(--border);color:var(--txt)}.btn-out:hover:not(:disabled){border-color:var(--navy)}
.btn-ok{background:var(--ok2);color:#fff}.btn-ok:hover:not(:disabled){background:var(--ok)}
.btn-red{background:var(--red2);color:#fff}
.btn-warn{background:var(--warn2);color:#fff}
.btn-purple{background:var(--purple2);color:#fff}
.btn-sm{padding:7px 14px;font-size:12px;width:auto;font-weight:700}
.btn-xs{padding:4px 10px;font-size:11px;width:auto;font-weight:700}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-row .btn{flex:1;min-width:110px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:15px;height:15px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-ttl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.b-navy{background:#e8eaf6;color:var(--navy)}.b-gold{background:var(--gold2);color:#7a5a1a}
.b-ok{background:var(--ok-bg);color:var(--ok)}.b-red{background:var(--red-bg);color:var(--red)}
.b-warn{background:var(--warn-bg);color:var(--warn)}.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-rest{background:#e8eaf6;color:var(--navy)}.b-cat{background:var(--purple-bg);color:var(--purple)}
.b-cld{background:#e3f2fd;color:#0d47a1}.b-urg{background:var(--warn-bg);color:var(--warn)}
.b-muted{background:#f0f2f8;color:var(--muted)}

/* ── HOME TILES ── */
.home-top{text-align:center;padding:20px 0 16px}
.home-greeting{font-size:22px;font-weight:800;color:var(--navy)}
.home-sub{font-size:12px;color:var(--muted);margin-top:3px}
.id-bar{background:var(--navy);color:#fff;border-radius:9px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.id-info{font-size:13px;line-height:1.6}
.id-info strong{display:block;font-size:15px}
.id-role{font-size:10px;background:rgba(201,166,104,.2);color:var(--gold);padding:2px 8px;border-radius:8px;font-weight:700}
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.tile{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:8px}
.tile:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:0 4px 14px rgba(26,38,66,.12)}
.tile.gold{background:linear-gradient(135deg,#fff9f0,var(--gold2));border-color:var(--gold3)}
.tile.gold:hover{border-color:var(--gold)}
.tile.purple{background:linear-gradient(135deg,#faf5ff,var(--purple-bg));border-color:#c4b5fd}
.tile.purple:hover{border-color:var(--purple2)}
.tile-icon{font-size:36px;line-height:1}
.tile-label{font-size:14px;font-weight:800;color:var(--txt)}
.tile-sub{font-size:11px;color:var(--muted);line-height:1.3}

/* ── TABS ── */
.tabs{display:flex;background:var(--card);border-radius:9px;padding:3px;margin-bottom:12px;border:1px solid var(--border);gap:2px;overflow-x:auto}
.tb{flex:1;min-width:70px;padding:8px 5px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:10px;font-weight:700;text-align:center;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;transition:all .15s;font-family:inherit}
.tb.on{background:var(--navy);color:#fff}
.tb-cnt{display:inline-flex;align-items:center;justify-content:center;background:var(--gold);color:var(--navy);font-size:9px;width:15px;height:15px;border-radius:50%;margin-left:3px;font-weight:800;vertical-align:middle}

/* ── ORDER TYPE ── */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.type-tile{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px 14px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:7px}
.type-tile:hover:not(.disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.type-tile.sel{border-width:3px;border-color:var(--navy)}
.type-tile.disabled{opacity:.4;cursor:not-allowed;background:#f8f8f8}
.tt-icon{font-size:38px}.tt-name{font-size:14px;font-weight:800;color:var(--txt)}
.tt-desc{font-size:11px;color:var(--muted);line-height:1.3}
.tt-soon{font-size:10px;background:#e5e7eb;color:#6b7280;padding:2px 8px;border-radius:10px;font-weight:700}

/* ── URGENCY ── */
.urg-row{display:flex;gap:9px}
.urg-btn{flex:1;padding:10px;border-radius:8px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:700;text-align:center;transition:all .15s;color:var(--muted);font-family:inherit}
.urg-btn.ok{border-color:var(--ok2);background:var(--ok-bg);color:var(--ok)}
.urg-btn.hot{border-color:var(--warn2);background:var(--warn-bg);color:var(--warn)}

/* ── ITEM TABS ── */
.srch{position:relative;margin-bottom:11px}
.srch input{padding-left:36px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--muted);pointer-events:none}

/* ── CATEGORY ACCORDION ── */
.cat-block{background:var(--card);border-radius:9px;margin-bottom:8px;overflow:hidden;border:1px solid var(--border)}
.cat-hdr{padding:10px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;background:#f5f7fc;transition:background .1s}
.cat-hdr:hover{background:#eef0f8}
.cat-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--navy2)}
.cat-cnt{font-size:10px;background:#e8eaf6;color:var(--navy);padding:2px 7px;border-radius:8px;margin-left:6px;font-weight:700}
.cat-arr{font-size:11px;color:var(--muted);transition:transform .2s}
.cat-arr.o{transform:rotate(180deg)}
.cat-body{display:none}.cat-body.o{display:block}

/* ── ITEM ROW ── */
.item-row{display:flex;align-items:center;padding:8px 13px;border-top:1px solid #f0f2f8;gap:8px;transition:background .1s}
.item-row.ic{background:#f0f7ff}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;line-height:1.3;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-hist{font-size:10px;color:var(--light);margin-top:1px}
.item-hist .hl{color:var(--navy2);font-weight:600}
.item-controls{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qb{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:#fff;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .1s;flex-shrink:0}
.qb:hover,.qb.on{border-color:var(--navy);background:var(--navy);color:#fff}
.qn{width:38px;text-align:center;font-size:14px;font-weight:700;border:2px solid var(--border);border-radius:6px;padding:3px 1px;color:var(--txt);font-family:inherit}
.qn:focus{outline:none;border-color:var(--navy)}
.qu{width:62px;font-size:11px;border:2px solid var(--border);border-radius:6px;padding:3px 2px;color:var(--txt);background:#fff;cursor:pointer;font-family:inherit}
.qu:focus{outline:none;border-color:var(--navy)}
.no-res{padding:20px;text-align:center;font-size:13px;color:var(--muted)}

/* ── FREQUENT GRID ── */
.freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.freq-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:10px 11px;cursor:pointer;transition:all .15s}
.freq-item:hover{border-color:var(--navy);background:#f5f7fc}
.freq-item.ic{border-color:var(--ok2);background:var(--ok-bg)}
.fi-name{font-size:12px;font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:4px}
.fi-hist{font-size:10px;color:var(--muted)}
.fi-hist .hl{color:var(--navy2);font-weight:600}
.fi-controls{display:flex;align-items:center;gap:5px;margin-top:7px}

/* ── FAB ── */
.fab{position:fixed;bottom:18px;right:16px;background:var(--navy);color:#fff;border:none;border-radius:50px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3);display:flex;align-items:center;gap:7px;z-index:200;transition:all .2s;font-family:inherit}
.fab:hover{transform:translateY(-2px)}
.fab-cnt{background:var(--gold);color:var(--navy);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.fab.hide{display:none}

/* ── INFO BAR ── */
.info-bar{background:var(--navy);color:#fff;border-radius:9px;padding:11px 14px;margin-bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ib{display:flex;flex-direction:column;gap:2px}
.ib-l{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.5px}
.ib-v{font-size:13px;font-weight:700}
.event-bar{background:var(--purple2);color:#fff;border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:13px}
.event-bar strong{font-size:15px;display:block;margin-bottom:2px}

/* ── REVIEW ── */
.rev-sup{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:9px 0 5px;border-bottom:1px solid var(--border);margin-bottom:5px}
.rev-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f2f8;font-size:13px}
.rev-item:last-child{border-bottom:none}
.rev-qty{font-weight:700;color:var(--navy);margin-left:10px;flex-shrink:0}
.rev-empty{text-align:center;padding:28px;color:var(--muted);font-size:13px}

/* ── CONFIRM ── */
.conf-icon{font-size:60px;text-align:center;margin:20px 0 10px}
.conf-ttl{font-size:20px;font-weight:800;text-align:center;color:var(--ok);margin-bottom:5px}
.conf-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.6}
.oid-box{background:var(--gold2);border:2px dashed var(--gold);border-radius:9px;padding:14px;text-align:center;margin-bottom:16px}
.oid-l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px}
.oid-v{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:2px;font-family:monospace}

/* ── STEP BAR ── */
.step-bar{display:flex;gap:5px;justify-content:center;margin-top:7px}
.sb{height:4px;border-radius:2px;background:rgba(255,255,255,.2);flex:1;transition:background .2s}
.sb.done{background:rgba(255,255,255,.5)}.sb.now{background:var(--gold)}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center}
.stat-n{font-size:28px;font-weight:800;color:var(--navy)}
.stat-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:2px}
.stat.gold .stat-n{color:#7a5a1a}.stat.ok .stat-n{color:var(--ok)}.stat.warn .stat-n{color:var(--warn2)}.stat.red .stat-n{color:var(--red2)}

/* ── MANAGER APPROVAL ── */
.req-card{background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:9px;overflow:hidden}
.req-hdr{padding:11px 14px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;background:#f5f7fc;transition:background .1s}
.req-hdr:hover{background:#eef0f8}
.req-id{font-family:monospace;font-size:11px;font-weight:700;color:var(--navy)}
.req-meta{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.req-body{display:none;padding:12px 14px;border-top:1px solid var(--border)}
.req-body.o{display:block}
.rev-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid #f0f2f8;gap:8px}
.rev-row:last-child{border-bottom:none}
.rev-row.rejected{opacity:.45;text-decoration:line-through}
.rv-name{flex:1;font-size:13px}
.rv-qty-inp{width:64px;padding:5px 6px;border:2px solid var(--border);border-radius:6px;font-size:13px;font-weight:700;text-align:center;font-family:inherit}
.rv-qty-inp:focus{outline:none;border-color:var(--navy)}
.rv-unit{font-size:11px;color:var(--muted);width:50px}
.rv-reject{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .1s}
.rv-reject.on{border-color:var(--red2);background:var(--red-bg);color:var(--red2)}

/* ── LEAVE ── */
.leave-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.lt-btn{padding:12px;border:2px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;text-align:center;font-size:13px;font-weight:700;color:var(--muted);transition:all .15s;font-family:inherit}
.lt-btn.sel{border-color:var(--navy);background:#f0f2fa;color:var(--navy)}
.leave-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:9px}
.lc-top{display:flex;align-items:flex-start;justify-content:space-between}
.lc-name{font-size:13px;font-weight:700}
.lc-dates{font-size:11px;color:var(--muted);margin-top:3px}

/* ── ATTENDANCE ── */
.att-status{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px}
.att-status.in{border-color:var(--ok2);background:var(--ok-bg)}
.att-status.out{border-color:var(--warn2);background:var(--warn-bg)}
.att-icon{font-size:48px;margin-bottom:8px}
.att-label{font-size:16px;font-weight:800;color:var(--txt)}
.att-time{font-size:22px;font-weight:800;color:var(--navy);margin:4px 0}
.att-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f2f8;font-size:13px}
.att-row:last-child{border-bottom:none}

/* ── UPCOMING EVENTS ── */
.ev-section{margin-bottom:14px}
.ev-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ev-section-ttl{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--navy)}
.ev-count{font-size:11px;background:var(--purple-bg);color:var(--purple2);padding:2px 9px;border-radius:10px;font-weight:700}
.ev-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.ev-card-hdr{background:linear-gradient(135deg,var(--purple2) 0%,#4c1d95 100%);color:#fff;padding:11px 14px}
.ev-card-name{font-size:14px;font-weight:800;margin-bottom:4px}
.ev-card-meta{font-size:11px;opacity:.85;display:flex;flex-wrap:wrap;gap:5px}
.ev-pill{background:rgba(255,255,255,.15);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap}
.ev-card-body{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.ev-loc{font-size:13px;color:var(--txt);font-weight:500}
.ev-days{font-size:11px;color:var(--muted);margin-top:2px}
.ev-detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f2f8;font-size:13px}
.ev-detail-row:last-child{border-bottom:none}

function getItemHist(){return lsG('fb_item_hist',{});}
function saveItemHist(items){
  const h=getItemHist(),today=new Date().toISOString().split('T')[0];
  items.forEach(it=>{
    if(!h[it.name])h[it.name]={lastDate:'',lastQty:0,lastUnit:'',orders:0,totalQty:0};
    Object.assign(h[it.name],{lastDate:today,lastQty:it.qty,lastUnit:it.unit,orders:(h[it.name].orders||0)+1,totalQty:(h[it.name].totalQty||0)+parseFloat(it.qty||0)});
  });
  lsS('fb_item_hist',h);
}
function getFreqItems(n=20){
  const h=getItemHist();
  return Object.entries(h).filter(([,v])=>v.orders>0).sort((a,b)=>b[1].orders-a[1].orders).slice(0,n)

async function api(params){
  if(!isBackendSet()) return null;
  try{
    const url=CFG.BACKEND_URL+'?'+new URLSearchParams(params);
    const r=await fetch(url);
    return await r.json();
  }catch(e){console.warn('API error',e);return null;}
}
async function apiData(action,data){
  if(!isBackendSet()) return null;
  try{
    const url=CFG.BACKEND_URL+'?action='+encodeURIComponent(action)+'&data='+encodeURIComponent(JSON.stringify(data));
    const r=await fetch(url);
    return await r.json();
  }catch(e){console.warn('API error',e);return null;}
}

function renderHeader(){
  const {user,screen}=S;
  if(!user) return '';
  const canBack = screen!=='s-home'&&screen!=='m-home'&&screen!=='a-home';
  const steps=getSteps();
  const photo=lsG('fb_photo_'+user.userId,null);
  const initials=user.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const photoHtml=photo
    ?`<img class="hdr-photo" src="${photo}" onclick="document.getElementById('photoUpload').click()" title="Change photo">`
    :`<div class="hdr-photo-init" onclick="document.getElementById('photoUpload').click()" title="Upload photo">${initials}</div>`;
  return`<div class="hdr">
    <div class="hdr-inner">
      ${canBack?`<button class="hdr-back" onclick="goBack()">←</button>`:''}
      <div class="hdr-brand" onclick="go(homeScreen())" style="cursor:pointer">
        <div class="hdr-brand-name">FLENBO<span>HUB</span></div>
        <div class="hdr-brand-sub">OPERATIONS PLATFORM</div>
      </div>
      <div class="hdr-right" style="display:flex;align-items:center;gap:8px">
        <div style="font-size:12px;font-weight:700;text-align:right">${esc(user.name)}</div>
        ${photoHtml}
      </div>
    </div>
    ${steps?`<div class="hdr-inner"><div class="step-bar" style="width:100%">${steps}</div></div>`:''}
    <input type="file" id="photoUpload" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
  </div>`;
}

function uploadPhoto(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    lsS('fb_photo_'+S.user.userId, e.target.result);
    render();
  };
  reader.readAsDataURL(file);
}

function getSteps(){
  const m={'s-ration-type':['Type','','','',''],'s-ration-event':['✓','Event','','',''],'s-ration-setup':['✓','✓','Details','',''],'s-ration-items':['✓','✓','✓','Items',''],'s-ration-review':['✓','✓','✓','✓','Review']};
  if(!m[S.screen])return'';
  return m[S.screen].map((l,i)=>`<div class="sb ${l==='✓'?'done':l?'now':''}" title="${l||''}"></div>`).join('');
}

function goBack(){
  const backs={'s-ration-event':'s-ration-type','s-ration-setup':S.orderType==='Catering'?'s-ration-event':'s-ration-type','s-ration-items':'s-ration-setup','s-ration-review':'s-ration-items','s-ration-confirm':'s-home','s-leave':'s-home','s-leave-done':'s-home','s-leave-hist':'s-home','s-attend':'s-home','m-review':'m-home'};
  const next=backs[S.screen]||homeScreen();
  go(next);
}
function homeScreen(){return S.user?.role==='manager'?'m-home':S.user?.role==='admin'?'a-home':'s-home';}
function go(s){S.screen=s;render();}

      </div>
      <div style="margin-top:18px">
        <button class="btn btn-navy" onclick="doLogin()" ${S.loading?'disabled':''}>
          ${S.loading?'<span class="spin"></span> Signing in…':'🔐 Sign In'}
        </button>
      </div>
    </div>
  </div>`;
}

async function doLogin(){
  // Read values from state (oninput keeps S.loginUser/S.loginPw in sync)
  const u=(S.loginUser||'').trim().toLowerCase();
  const p=(S.loginPw||'').trim();
  if(!u||!p){S.loginError='Enter username and password.';render();return;}
  S.loading=true;S.loginError='';render();
  let user=null;
  if(isBackendSet()){
    const res=await api({action:'login',username:u,password:p});
    if(res?.success) user=res.user;
  } else {
    user=DEMO_USERS.find(x=>x.username===u&&String(x.password)===String(p))||null;
  }
  S.loading=false;
  if(!user){S.loginError='Invalid username or password.';render();return;}
  // Merge backend user with demo data — backend may not return annualLeave/casualLeave
  const demoMatch=DEMO_USERS.find(d=>d.userId===user.userId||d.username===(user.username||user.Username));
  if(demoMatch) user={...demoMatch,...user}; // demo as base, backend overrides core fields
  S.user=user;lsS('fb_session',user);
  S.screen=homeScreen();
  if(user.role==='manager') loadManagerData();
  else if(user.role==='admin') loadAdminData();
  else loadStaffData();
  render();
}

async function loadStaffData(){
  const {user}=S;
  // Pre-populate from cache so UI shows data immediately (before backend responds)
  if(!S.todayAtt) S.todayAtt=lsG('fb_att_'+today(),null);
  if(!S.myLeaves?.length) S.myLeaves=lsG('fb_leaves_'+user.userId,[]);
  if(!S.customItems?.length) S.customItems=lsG('fb_custom_items',[]);
  if(!S.upcomingEvents?.length) S.upcomingEvents=getLocalCateringEvents();
  render(); // show cached data immediately before awaiting backend
  if(isBackendSet()){
    const [r,rl,rci,rc]=await Promise.all([
      api({action:'getAttendance',userId:user.userId,date:today()}),
      api({action:'getLeaves',userId:user.userId}),
      api({action:'getCustomItems'}),
      api({action:'getCateringEvents'})
    ]);
    if(r?.record){S.todayAtt=r.record;lsS('fb_att_'+today(),r.record);}
    if(rl?.leaves){
      // Merge: keep optimistically-added local leaves not yet confirmed by backend
      const sIds=new Set(rl.leaves.map(l=>l.leaveId));
      S.myLeaves=[...S.myLeaves.filter(l=>!sIds.has(l.leaveId)),...rl.leaves];
      lsS('fb_leaves_'+user.userId,S.myLeaves.slice(0,50));
    }
    if(rci?.items){S.customItems=rci.items;lsS('fb_custom_items',rci.items);}
    if(rc?.events&&rc.events.length) S.upcomingEvents=rc.events;
    else S.upcomingEvents=getLocalCateringEvents();
  } else {
    S.todayAtt=lsG('fb_att_'+today(),null);
    S.myLeaves=lsG('fb_leaves_'+user.userId,[]);
    S.customItems=lsG('fb_custom_items',[]);
    S.upcomingEvents=getLocalCateringEvents();
  }
  render();
}

function isOrderingOpen(){const hr=new Date().getHours();return hr>=8&&hr<20;}

function startRation(){
  if(!isOrderingOpen()){
    alert('⏰ Ration ordering is available only between 8:00 AM and 8:00 PM.\nPlease try again during ordering hours.');
    return;
  }
  S.orderType='';S.eventType='';S.eventName='';S.eventDate='';S.pax='';S.eventClient='';S.eventPhone='';S.eventTime='';S.eventLocation='';S.eventLocationNew='';S.ckLocation='';
  S.deliveryDate=dayAfterTomorrow();S.urgency='Normal';S.remarks='';
  S.cart={};S.tab='FREQUENT';S.search='';S.catOpen={};
  go('s-ration-type');
}

  const open=isOrderingOpen();

function validateCateringForm(){
  const missing=[];
  if(!S.eventType)    missing.push('Type of Event');
  if(!S.eventName)    missing.push('Event Name / Description');
  if(!S.eventDate)    missing.push('Event Date');
  if(!S.eventTime)    missing.push('Meal / Event Time');
  if(!S.pax)          missing.push('Number of Guests (PAX)');
  if(!S.eventClient)  missing.push('Client Name');
  if(!S.eventPhone)   missing.push('Client Phone');
  if(!S.eventLocation)missing.push('Event Location');
  if(S.eventLocation==='NEW LOCATION'&&!S.eventLocationNew) missing.push('New Location Details');
  if(missing.length){
    alert('Please fill in:\n\n• '+missing.join('\n• '));
    return;
  }
  go('s-ration-setup');
}

function renderFreqTab(freq,search){
  const filtered=search?freq.filter(f=>f.name.toLowerCase().includes(search)):freq;
  if(!filtered.length)return`<div class="no-res">${search?'No items match your search':'No frequent items yet — order a few times to build your list!'}</div>`;
  return`<div class="freq-grid">${filtered.map(f=>{
    const k=`${f.sup}|${f.cat}|${f.name}`;const v=S.cart[k]||{qty:0,unit:f.unit};
    return`<div class="freq-item ${v.qty>0?'ic':''}">
      <div class="fi-name">${esc(f.name)}</div>
      <div class="fi-hist">📅 ${esc(f.lastDate?fmtDate(f.lastDate):'—')} · <span class="hl">${f.lastQty} ${f.lastUnit}</span></div>
      <div class="fi-controls">
        <button class="qb" onclick="adjCart('${esc(k)}','${esc(f.unit)}',-1)">−</button>
        <input class="qn" type="number" min="0" value="${v.qty||0}" oninput="setCart('${esc(k)}','${esc(f.unit)}',this.value)">
        <select class="qu" onchange="setCartUnit('${esc(k)}',this.value)">${UNITS.map(u=>`<option ${(v.unit||f.unit)===u?'selected':''}>${u}</option>`).join('')}</select>
        <button class="qb" onclick="adjCart('${esc(k)}','${esc(f.unit)}',1)">+</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderSupTab(sup,search){
  const cats=ITEMS[sup];if(!cats)return`<div class="no-res">No items</div>`;
  return Object.entries(cats).map(([cat,items])=>{
    const filtered=search?items.filter(([n])=>n.toLowerCase().includes(search)):items;
    if(!filtered.length&&search)return'';
    const open=S.catOpen[cat]!==false;
    const inCart=filtered.filter(([n])=>{const k=`${sup}|${cat}|${n}`;return(S.cart[k]?.qty||0)>0;}).length;
    return`<div class="cat-block">
      <div class="cat-hdr" onclick="S.catOpen['${esc(cat)}']=!S.catOpen['${esc(cat)}'];render()">
        <span class="cat-name">${esc(cat)}<span class="cat-cnt">${inCart||''}</span></span>
        <span class="cat-arr ${open?'o':''}">▼</span>
      </div>
      <div class="cat-body ${open?'o':''}">
        ${filtered.map(([name,defUnit])=>{
          const k=`${sup}|${cat}|${name}`;const v=S.cart[k]||{qty:0,unit:defUnit};
          const h=getItemHist()[name];
          return`<div class="item-row ${v.qty>0?'ic':''}">
            <div class="item-info">
              <div class="item-name" title="${esc(name)}">${esc(name)}</div>
              ${h?.lastDate?`<div class="item-hist">📅 ${fmtDate(h.lastDate)} · <span class="hl">${h.lastQty} ${h.lastUnit}</span> · ${h.orders}x</div>`:''}
            </div>
            <div class="item-controls">
              <button class="qb" onclick="adjCart('${esc(k)}','${esc(defUnit)}',-1)">−</button>
              <input class="qn" type="number" min="0" value="${v.qty||0}" oninput="setCart('${esc(k)}','${esc(defUnit)}',this.value)">
              <select class="qu" onchange="setCartUnit('${esc(k)}',this.value)">${UNITS.map(u=>`<option ${(v.unit||defUnit)===u?'selected':''}>${u}</option>`).join('')}</select>
              <button class="qb" onclick="adjCart('${esc(k)}','${esc(defUnit)}',1)">+</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function adjCart(k,defUnit,d){
  if(!S.cart[k])S.cart[k]={qty:0,unit:defUnit};
  S.cart[k].qty=Math.max(0,parseFloat(S.cart[k].qty||0)+d);
  render();
}
function setCart(k,defUnit,v){
  if(!S.cart[k])S.cart[k]={qty:0,unit:defUnit};
  S.cart[k].qty=Math.max(0,parseFloat(v)||0);
}
function setCartUnit(k,u){if(S.cart[k])S.cart[k].unit=u;}

async function submitOrder(){
  const items=cartItems();if(!items.length)return;
  S.orderId=genId(S.user.location);
  const resolvedLoc = S.orderType==='Catering'?(S.eventLocation==='NEW LOCATION'?S.eventLocationNew:S.eventLocation):(S.ckLocation||S.user.location);
  const order={
    orderId:S.orderId,orderType:S.orderType,
    eventType:S.eventType,eventName:S.eventName,eventDate:S.eventDate,eventTime:S.eventTime,
    pax:S.pax,eventClient:S.eventClient,eventPhone:S.eventPhone,
    ckLocation:S.ckLocation,eventLocation:resolvedLoc,
    location:resolvedLoc,staffName:S.user.name,userId:S.user.userId,
    deliveryDate:S.deliveryDate,urgency:S.urgency,remarks:S.remarks,
    submittedAt:new Date().toISOString(),items,status:'Pending',
  };
  if(isBackendSet()) apiData('submit',order); // background, no await
  // Save catering event for upcoming events section
  if(S.orderType==='Catering'){
    const evList=lsG('fb_catering_events',[]);
    evList.push({
      orderId:order.orderId,eventType:order.eventType,eventName:order.eventName,
      eventDate:order.eventDate,eventTime:order.eventTime,pax:order.pax,
      eventLocation:order.eventLocation,eventClient:order.eventClient,
      eventPhone:order.eventPhone,deliveryDate:order.deliveryDate,
      urgency:order.urgency,remarks:order.remarks,staffName:order.staffName,
      submittedAt:order.submittedAt,status:'Pending',items:order.items,
    });
    lsS('fb_catering_events',evList);
    S.upcomingEvents=getLocalCateringEvents();
  }
  saveItemHist(items);
  go('s-ration-confirm');
}

    ? `*Ration Request — Catering*\nEvent: ${S.eventType} | ${S.eventName}\nDate: ${fmtDate(S.eventDate)} | Time: ${S.eventTime}\nLocation: ${S.eventLocation==='NEW LOCATION'?S.eventLocationNew:S.eventLocation}\nClient: ${S.eventClient} (${S.eventPhone})\nPAX: ${S.pax}`

    ? `*Ration Request — Cloud Kitchen*\nLocation: ${S.ckLocation}`

}

function renderLeaveForm(){
  const al=(S.user.annualLeave||0);
  const cl=(S.user.casualLeave||0);
  const leaveDays=S.leaveFrom&&S.leaveTo?Math.max(0,Math.round((new Date(S.leaveTo)-new Date(S.leaveFrom))/(86400000))+1):0;
  const notEnoughAnnual=S.leaveType==='Annual Leave'&&leaveDays>al;
  const notEnoughCasual=S.leaveType==='Casual Leave'&&leaveDays>cl;
  const sickExceeds2=S.leaveType==='Sick Leave'&&leaveDays>2;
  const notEnoughSick=S.leaveType==='Sick Leave'&&leaveDays>al;
  const disableSubmit=!S.leaveType||!S.leaveFrom||!S.leaveTo||!S.leaveReason||notEnoughAnnual||notEnoughCasual||sickExceeds2||notEnoughSick||S.loading;
  const balPolicyHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div onclick="S.leaveType='Annual Leave';render()" style="border:2px solid ${S.leaveType==='Annual Leave'?'var(--navy)':'var(--border)'};background:${S.leaveType==='Annual Leave'?'#f0f2fa':'#fff'};border-radius:9px;padding:11px;cursor:pointer;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#1a2642">${al.toFixed(2)*1}</div>
        <div style="font-size:12px;font-weight:700;color:var(--navy)">Annual Leave</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">✅ No salary deduction</div>
      </div>
      <div onclick="S.leaveType='Casual Leave';render()" style="border:2px solid ${S.leaveType==='Casual Leave'?'#dc2626':'var(--border)'};background:${S.leaveType==='Casual Leave'?'#fff5f5':'#fff'};border-radius:9px;padding:11px;cursor:pointer;text-align:center">
        <div style="font-size:18px;font-weight:800;color:#dc2626">${cl.toFixed(2)*1}</div>
        <div style="font-size:12px;font-weight:700;color:#dc2626">Casual Leave</div>
        <div style="font-size:10px;color:var(--muted);margin-top:3px">⚠️ Salary deducted · max 2/month</div>
      </div>
    </div>
    <div onclick="S.leaveType='Sick Leave';render()" style="border:2px solid ${S.leaveType==='Sick Leave'?'#b45309':'var(--border)'};background:${S.leaveType==='Sick Leave'?'#fffbeb':'#fff'};border-radius:9px;padding:11px;cursor:pointer;text-align:center;margin-bottom:12px">
      <div style="font-size:14px;font-weight:800;color:#b45309">🤒 Sick Leave</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">Max 2 days · Deducted from Annual Leave · Salary deducted</div>
    </div>`;
  return`<div class="scr on">
    <div class="card">
      <div class="card-ttl">Leave Application</div>
      <label class="fl">Select Leave Type — tap to choose *</label>
      ${balPolicyHTML}
      ${S.leaveType==='Annual Leave'?`<div class="alert alert-ok" style="margin-bottom:10px"><strong>Annual Leave</strong> — balance reduced by days taken. No salary deduction.</div>`:''}
      ${S.leaveType==='Casual Leave'?`<div class="alert alert-warn" style="margin-bottom:10px"><strong>Casual Leave</strong> — salary deducted for days absent. Balance: ${cl} remaining. Expires 31st March every year.</div>`:''}
      ${S.leaveType==='Sick Leave'?`<div class="alert" style="background:#fffbeb;border-color:#b45309;margin-bottom:10px"><strong>🤒 Sick Leave</strong> — max 2 days per application. Days deducted from your Annual Leave balance (${al} remaining). Salary is deducted.</div>`:''}
      <label class="fl">From Date *</label>
      <input class="fi" type="date" value="${esc(S.leaveFrom)}" min="${today()}" oninput="S.leaveFrom=this.value;render()">
      <label class="fl">To Date *</label>
      <input class="fi" type="date" value="${esc(S.leaveTo)}" min="${S.leaveFrom||today()}" oninput="S.leaveTo=this.value;render()">
      ${leaveDays>0?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">📅 ${leaveDays} day${leaveDays>1?'s':''} selected</div>`:''}
      ${notEnoughAnnual?`<div class="alert alert-warn">⚠️ You only have ${al} Annual Leave day${al!==1?'s':''} remaining.</div>`:''}
      ${notEnoughCasual?`<div class="alert alert-warn">⚠️ You only have ${cl} Casual Leave day${cl!==1?'s':''} remaining.</div>`:''}
      ${sickExceeds2?`<div class="alert alert-warn">⚠️ Sick Leave is limited to 2 days per application.</div>`:''}
      ${notEnoughSick&&!sickExceeds2?`<div class="alert alert-warn">⚠️ Insufficient Annual Leave balance for Sick Leave (${al} days remaining).</div>`:''}
      <label class="fl">Reason *</label>
      <textarea class="ft" rows="3" placeholder="Briefly explain the reason…" oninput="S.leaveReason=this.value;updateLeaveBtn()">${esc(S.leaveReason)}</textarea>
    </div>
    <button id="leave-submit-btn" class="btn btn-gold" onclick="submitLeave()" ${disableSubmit?'disabled':''}>
      ${S.loading?'<span class="spin"></span> Submitting…':'Submit Leave Application'}
    </button>
  </div>`;
}

function updateLeaveBtn(){
  const btn=document.getElementById('leave-submit-btn');
  if(!btn)return;
  const leaveDays=S.leaveFrom&&S.leaveTo?Math.max(0,Math.round((new Date(S.leaveTo)-new Date(S.leaveFrom))/(86400000))+1):0;
  const al=S.user?.annualLeave||0;
  const cl=S.user?.casualLeave||0;
  const bad=!S.leaveType||!S.leaveFrom||!S.leaveTo||!S.leaveReason||
    (S.leaveType==='Annual Leave'&&leaveDays>al)||
    (S.leaveType==='Casual Leave'&&leaveDays>cl)||
    (S.leaveType==='Sick Leave'&&(leaveDays>2||leaveDays>al));
  btn.disabled=bad;
}
async function submitLeave(){
  const leave={leaveId:'LV-'+Date.now(),userId:S.user.userId,staffName:S.user.name,location:S.user.location,leaveType:S.leaveType,fromDate:S.leaveFrom,toDate:S.leaveTo,reason:S.leaveReason,submittedAt:new Date().toISOString(),status:'Pending'};

  S.myLeaves=[leave,...S.myLeaves];
  const arr=lsG('fb_leaves_'+S.user.userId,[]);arr.unshift(leave);lsS('fb_leaves_'+S.user.userId,arr.slice(0,30));
  S.leaveType='';S.leaveFrom='';S.leaveTo='';S.leaveReason='';
  go('s-leave-done');

  if(isBackendSet()) apiData('submitLeave',leave);
}

async function loadManagerData(){
  const uid=S.user?.userId||'mgr';
  // Pre-populate from cache so stats show instantly
  if(!S.pendingOrders?.length) S.pendingOrders=lsG('fb_mgr_orders',[]);
  if(!S.pendingLeaves?.length) S.pendingLeaves=lsG('fb_mgr_leaves',[]);
  if(!S.todayAttAll?.length) S.todayAttAll=lsG('fb_mgr_att',[]);
  if(!S.myLeaves?.length) S.myLeaves=lsG('fb_leaves_'+uid,[]);
  if(!S.upcomingEvents?.length) S.upcomingEvents=getLocalCateringEvents();
  render(); // show cached data immediately before awaiting backend
  if(isBackendSet()){
    const [ro,rl,ra,rml,rc]=await Promise.all([
      api({action:'getOrders',status:'Pending'}),
      api({action:'getLeaves',status:'Pending'}),
      api({action:'getAttendance',date:today()}),
      api({action:'getMyLeaves',userId:uid}),
      api({action:'getCateringEvents'})
    ]);
    if(ro?.orders){S.pendingOrders=ro.orders;lsS('fb_mgr_orders',ro.orders);}
    if(rl?.leaves){S.pendingLeaves=rl.leaves;lsS('fb_mgr_leaves',rl.leaves);}
    if(ra?.records){S.todayAttAll=ra.records;lsS('fb_mgr_att',ra.records);}
    if(rml?.leaves){S.myLeaves=rml.leaves;lsS('fb_leaves_'+uid,rml.leaves);}
    if(rc?.events&&rc.events.length) S.upcomingEvents=rc.events;
    else S.upcomingEvents=getLocalCateringEvents();
  } else {
    S.pendingOrders=getDemoOrders();
    S.pendingLeaves=getDemoLeaves();
    S.todayAttAll=getDemoAtt();
    S.myLeaves=lsG('fb_leaves_'+uid,[]);
    S.upcomingEvents=getLocalCateringEvents();
  }
}

async function loadAdminData(){
  // Pre-populate from cache so stats show instantly
  if(!S.approvedOrders?.length) S.approvedOrders=lsG('fb_adm_orders',[]);
  if(!S.allStaff?.length) S.allStaff=lsG('fb_custom_staff',null)||getDemoStaff();
  if(!S.allLeaves?.length) S.allLeaves=lsG('fb_adm_leaves',[]);
  if(!S.allLocations?.length) S.allLocations=lsG('fb_custom_locations',null)||DEMO_LOCATIONS.slice();
  if(!S.customItems?.length) S.customItems=lsG('fb_custom_items',[]);
  if(!S.upcomingEvents?.length) S.upcomingEvents=getLocalCateringEvents();
  render(); // show cached data immediately before awaiting backend
  if(isBackendSet()){
    const [ro,rs,rl,rloc,rci,rc]=await Promise.all([
      api({action:'getOrders',status:'Manager Approved'}),
      api({action:'getStaff'}),
      api({action:'getLeaves'}),
      api({action:'getLocations'}),
      api({action:'getCustomItems'}),
      api({action:'getCateringEvents'})
    ]);
    if(ro?.orders){S.approvedOrders=ro.orders;lsS('fb_adm_orders',ro.orders);}
    if(rs?.staff){
      // Merge backend staff with DEMO_USERS to fill in annualLeave/casualLeave (not in Staff sheet)
      S.allStaff=rs.staff.map(s=>{
        const demo=DEMO_USERS.find(d=>d.userId===s.userId||d.username===(s.username||s.Username));
        return demo?{...demo,...s}:s;
      });
      lsS('fb_custom_staff',S.allStaff);
    }
    if(rl?.leaves){S.allLeaves=rl.leaves;lsS('fb_adm_leaves',rl.leaves);}
    if(rloc?.locations){S.allLocations=rloc.locations;lsS('fb_custom_locations',rloc.locations);}
    if(rci?.items){S.customItems=rci.items;lsS('fb_custom_items',rci.items);}
    if(rc?.events&&rc.events.length) S.upcomingEvents=rc.events;
    else S.upcomingEvents=getLocalCateringEvents();
  } else {
    S.approvedOrders=getDemoApproved();
    S.allStaff=lsG('fb_custom_staff',null)||getDemoStaff();
    S.allLeaves=getDemoLeaves();
    S.allLocations=lsG('fb_custom_locations',null)||DEMO_LOCATIONS.slice();
    S.customItems=lsG('fb_custom_items',[]);
    S.upcomingEvents=getLocalCateringEvents();
  }
}

async function addCustomItem(){
  const sup=document.getElementById('ni-sup')?.value||'CUSTOM';
  const cat=document.getElementById('ni-cat')?.value?.trim();
  const name=document.getElementById('ni-name')?.value?.trim();
  const unit=document.getElementById('ni-unit')?.value||'KG';
  if(!name||!cat){alert('Please enter item name and category.');return;}
  if(S.customItems.find(i=>i.name.toLowerCase()===name.toLowerCase())){alert('Item already exists.');return;}
  const newItem={sup,cat,name,unit,custom:true};
  if(isBackendSet()){
    const r=await apiData('addCustomItem',newItem);
    if(r?.success){
      S.customItems=r.items||[...S.customItems,newItem];
      lsS('fb_custom_items',S.customItems);
    } else {alert('Failed to save item. Please try again.');}
  } else {
    S.customItems=[...S.customItems,newItem];
    lsS('fb_custom_items',S.customItems);
  }
  render();
}

async function removeCustomItem(idx){
  if(!confirm('Remove this item?'))return;
  const item=S.customItems[idx];
  if(isBackendSet()&&item){
    const r=await apiData('deleteCustomItem',{name:item.name});
    if(r?.success){
      S.customItems=r.items||S.customItems.filter((_,i)=>i!==idx);
      lsS('fb_custom_items',S.customItems);
    } else {alert('Failed to remove item.');}
  } else {
    S.customItems=S.customItems.filter((_,i)=>i!==idx);
    lsS('fb_custom_items',S.customItems);
  }
  render();
}

    fromDate:S.admLeaveFrom,
    toDate:S.admLeaveTo,
    reason:S.admLeaveReason,
    submittedAt:new Date().toISOString(),
    status:S.admLeaveStatus||'Approved',

}

function daysUntil(dateStr){
  if(!dateStr)return null;
  const diff=Math.round((new Date(dateStr+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000);
  return diff;
}

          <div style="font-size:13px;color:var(--muted)">No upcoming catering events</div>

          const urgentClass=d!==null&&d<=1?'b-red':d<=3?'b-warn':'b-muted';
          const dLabel=d===0?'TODAY':d===1?'TOMORROW':d!==null?`In ${d} days`:'';
          return`<div class="ev-card">
            <div class="ev-card-hdr">
              <div class="ev-card-name">${esc(ev.eventType)} — ${esc(ev.eventName)}</div>
              <div class="ev-card-meta">
                <span class="ev-pill">📅 ${fmtDate(ev.eventDate)}</span>
                <span class="ev-pill">🕐 ${esc(ev.eventTime)}</span>
                <span class="ev-pill">👥 ${esc(ev.pax)} PAX</span>
                ${dLabel?`<span class="ev-pill" style="background:${d<=1?'rgba(220,38,38,.3)':d<=3?'rgba(217,119,6,.3)':'rgba(255,255,255,.15)'}">${dLabel}</span>`:''}
              </div>
            </div>
            <div class="ev-card-body">
              <div style="flex:1;min-width:0">
                <div class="ev-loc">📍 ${esc(ev.eventLocation)}</div>
                ${isPriv?`<div style="font-size:12px;color:var(--muted);margin-top:3px">👤 ${esc(ev.eventClient)} &nbsp;·&nbsp; 📞 ${esc(ev.eventPhone)}</div>`:''}
              </div>
              <button class="btn btn-out btn-xs" onclick="S.eventDetail=${i};render()" style="flex-shrink:0">Details →</button>
            </div>
          </div>`;
        }).join('')}
  </div>`;
}

function renderEventDetailModal(){
  if(S.eventDetail===null)return`<div class="modal-bg" id="ev-modal"></div>`;
  const ev=S.upcomingEvents[S.eventDetail];
  if(!ev)return`<div class="modal-bg" id="ev-modal"></div>`;
  const role=S.user?.role||'staff';
  const isPriv=role==='admin'||role==='manager';
  const d=daysUntil(ev.eventDate);
  const dLabel=d===0?'TODAY — ':d===1?'TOMORROW — ':d!==null&&d>0?`In ${d} days — `:'';
  return`<div class="modal-bg open" id="ev-modal" onclick="if(event.target===this){S.eventDetail=null;render()}">
    <div class="modal" style="max-width:480px">
      <div class="modal-hdr" style="background:linear-gradient(135deg,var(--purple2),#4c1d95);color:#fff;border-radius:14px 14px 0 0">
        <div>
          <div class="modal-ttl" style="color:#fff">${esc(ev.eventType)}</div>
          <div style="font-size:12px;opacity:.85;margin-top:2px">${esc(ev.eventName)}</div>
        </div>
        <button class="modal-close" style="color:#fff" onclick="S.eventDetail=null;render()">✕</button>
      </div>
      <div class="modal-body" style="padding:0">
        <div style="background:var(--purple-bg);padding:10px 16px;font-size:12px;color:var(--purple2);font-weight:700">
          ${dLabel}${fmtDate(ev.eventDate)} &nbsp;·&nbsp; ${esc(ev.eventTime)}
        </div>
        <div style="padding:14px 16px">
          <div class="ev-detail-row"><span class="ev-detail-label">Event Date</span><span class="ev-detail-val">${fmtDate(ev.eventDate)}</span></div>
          <div class="ev-detail-row"><span class="ev-detail-label">Time Slot</span><span class="ev-detail-val">${esc(ev.eventTime)}</span></div>
          <div class="ev-detail-row"><span class="ev-detail-label">Location</span><span class="ev-detail-val">${esc(ev.eventLocation)}</span></div>
          <div class="ev-detail-row"><span class="ev-detail-label">Guests (PAX)</span><span class="ev-detail-val" style="font-size:16px;font-weight:800;color:var(--purple2)">${esc(ev.pax)}</span></div>
          ${isPriv?`
          <div class="ev-detail-row"><span class="ev-detail-label">Client Name</span><span class="ev-detail-val">${esc(ev.eventClient)}</span></div>
          <div class="ev-detail-row"><span class="ev-detail-label">Client Phone</span><span class="ev-detail-val"><a href="tel:${esc(ev.eventPhone)}" style="color:var(--navy);text-decoration:none;font-weight:700">📞 ${esc(ev.eventPhone)}</a></span></div>`:''}
          <div class="ev-detail-row"><span class="ev-detail-label">Ration Delivery</span><span class="ev-detail-val">${fmtDate(ev.deliveryDate)}</span></div>
          ${ev.remarks?`<div class="ev-detail-row"><span class="ev-detail-label">Notes</span><span class="ev-detail-val">${esc(ev.remarks)}</span></div>`:''}
          <div class="ev-detail-row"><span class="ev-detail-label">Submitted by</span><span class="ev-detail-val">${esc(ev.staffName)}</span></div>
          <div class="ev-detail-row"><span class="ev-detail-label">Status</span><span class="ev-detail-val"><span class="badge ${ev.status==='Pending'?'b-warn':ev.status==='Manager Approved'?'b-ok':'b-red'}">${esc(ev.status||'Pending')}</span></span></div>
          ${ev.items&&ev.items.length?`
          <div style="margin-top:12px">
            <div class="card-ttl" style="margin-bottom:8px">Ration Items (${ev.items.length})</div>
            <div class="ev-items-list">
              ${ev.items.map(it=>`<div class="ev-item-row"><span>${esc(it.name)}</span><span style="font-weight:700;color:var(--navy)">${it.qty} ${it.unit}</span></div>`).join('')}
            </div>
          </div>`:''}
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-navy btn-sm" onclick="S.eventDetail=null;render()">Close</button></div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   DEMO DATA
════════════════════════════════════════════ */
function getDemoOrders(){
  return lsG('fb_demo_orders',[]).map(o=>({...o,status:o.status||'Pending'}));
}
function getDemoApproved(){
  return lsG('fb_demo_orders',[]).filter(o=>o.status==='Manager Approved').flatMap(o=>(o.items||[]).map(it=>({...it,...o,status:'Manager Approved'})));
}
function getDemoLeaves(){
  const all=[];
  DEMO_USERS.forEach(u=>{const arr=lsG('fb_leaves_'+u.userId,[]);all.push(...arr);});
  return all.sort((a,b)=>b.submittedAt>a.submittedAt?1:-1);
}
function getDemoStaff(){return DEMO_USERS;}
function getDemoAttAll(){return lsG('fb_att_all_'+today(),[]);}


function doLogout(){
  lsS('fb_session',null);
  S.user=null;S.myLeaves=[];S.todayAtt=null;
  S.pendingOrders=[];S.pendingLeaves=[];S.todayAttAll=[];
  S.approvedOrders=[];S.allStaff=[];S.allLeaves=[];S.allLocations=[];
  S.upcomingEvents=[];S.eventDetail=null;
  S.loginUser='';S.loginPw='';S.loginError='';
  go('login');
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
function doLogout(){
  lsS('fb_session',null);
  S.user=null;S.myLeaves=[];S.todayAtt=null;
  S.pendingOrders=[];S.pendingLeaves=[];S.todayAttAll=[];
  S.approvedOrders=[];S.allStaff=[];S.allLeaves=[];S.allLocations=[];
  S.loginUser='';S.loginPw='';S.loginError='';
  go('login');
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
async function loadUserData(){
  if(!S.user)return;
  if(isBackendSet()){
    if(S.user.role==='admin') await loadAdminData();
    else if(S.user.role==='manager') await loadManagerData();
    else await loadStaffData();
    return;
  }else{
    S.myLeaves=lsG('fb_leaves_'+uid,[]);
    S.todayAtt=lsG('fb_att_'+today(),null);
    if(S.user.role==='manager'||S.user.role==='admin'){
      S.pendingOrders=lsG('fb_demo_orders',[]).filter(o=>o.status==='Pending');
      S.pendingLeaves=getDemoLeaves().filter(l=>l.status==='Pending');
      S.todayAttAll=getDemoAttAll();
    }
    if(S.user.role==='admin'){
      S.approvedOrders=getDemoApproved();
      S.allStaff=lsG('fb_custom_staff',null)||getDemoStaff();
      S.allLeaves=getDemoLeaves();
      S.allLocations=lsG('fb_custom_locations',null)||DEMO_LOCATIONS.slice();
    }
  }
}

window.addEventListener('DOMContentLoaded',()=>{
  const saved=lsG('fb_session',null);
  if(saved){
    S.user=saved;
    go(homeScreen());          // show home immediately with cached state
    loadUserData().then(()=>render()); // refresh from backend in background
  }else{
    go('login');
  }
});
</script>
